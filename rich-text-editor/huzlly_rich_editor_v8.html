<style>
  /* ═══════════════════════════════════════════════════════════════════

  #huz-plus-btn {

    color: #1a1a18;
  }

  #huz-plus-btn.open {
    border-color: var(--plus-idle);

  #huz-plus-btn.open:hover {
    border-color: var(--plus-idle);

  }

  /* ─────────────────────────────────────────────────────────────────
     Block menu
  ───────────────────────────────────────────────────────────────── */
  #huz-block-menu {
    position: absolute;
    left: 38px;

  #huz-block-menu.open > *:nth-child(7) { opacity: 1; transform: translateX(0); transition-delay: 92ms;  }

  .huz-menu-sep {

  .huz-menu-btn::after {
    content: attr(data-tip);
    position: absolute;
    top: calc(100% + 7px);
    left: 50%;
    transform: translateX(-50%) translateY(-4px);
    background: var(--tooltip-bg);

    font-size: 10px;
    font-weight: 500;

    pointer-events: none;
    opacity: 0;
    transition: opacity 0.14s ease, transform 0.14s ease;
    z-index: 200;
  }
  .huz-menu-btn::before {
    content: '';
    position: absolute;
    top: calc(100% + 2px);
    left: 50%;
    transform: translateX(-50%) translateY(-4px);
    border: 4px solid transparent;
    border-bottom-color: var(--tooltip-bg);
    pointer-events: none;

  }
  .huz-menu-btn:hover::after,
  .huz-menu-btn:hover::before {

  .huz-menu-btn svg {
    width: 14px;

    display: block;
    flex-shrink: 0;
  }

  /* ═══════════════════════════════════════════════════════════════════
     INLINE FORMATTING POPOVER — #huz-inline-toolbar
     BUG FIX 1: border-radius changed from 999px to 8px (soft card, not pill).
     Position is now adaptive — JS places it above OR below the selection
     depending on available vertical space, and clamps horizontally to the
     editor's client rect so it never clips outside the canvas.
  ═══════════════════════════════════════════════════════════════════ */
  #huz-inline-toolbar {
    position: fixed;
    display: flex;
    flex-direction: row;
    align-items: center;
    gap: 3px;
    padding: 4px 6px;
    background: #ffffff;
    border: 1px solid #E5E7EB;
    /* BUG FIX 1 — visual shape: soft rectangular card, not oval pill */
    border-radius: 8px;
    box-shadow: 0 4px 16px rgba(0, 0, 0, 0.10), 0 1px 4px rgba(0, 0, 0, 0.06);
    z-index: 9999;
    white-space: nowrap;
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
    transform: translateY(4px);
    transition: opacity 0.14s ease,
                visibility 0s linear 0.14s,
                transform 0.14s ease;
  }

  #huz-inline-toolbar.visible {
    opacity: 1;
    visibility: visible;
    pointer-events: all;
    transform: translateY(0);
    transition: opacity 0.14s ease,
                visibility 0s linear 0s,
                transform 0.14s ease;
  }

  /*
   * BUG FIX 1 — adaptive tooltip direction:
   * When toolbar is above text (.above), tooltip appears above button (bottom: ...).
   * When toolbar is below text (.below), tooltip appears below button (top: ...).
   * Default class is .above; JS sets .below when the toolbar flips.
   */
  #huz-inline-toolbar.above .huz-inline-btn::after {
    bottom: calc(100% + 7px);
    top: auto;
    transform: translateX(-50%) translateY(4px);
  }
  #huz-inline-toolbar.above .huz-inline-btn::before {
    bottom: calc(100% + 2px);
    top: auto;
    transform: translateX(-50%) translateY(4px);
    border-top-color: var(--tooltip-bg);
    border-bottom-color: transparent;
  }
  #huz-inline-toolbar.above .huz-inline-btn:hover::after,
  #huz-inline-toolbar.above .huz-inline-btn:hover::before {
    transform: translateX(-50%) translateY(0);
  }

  #huz-inline-toolbar.below .huz-inline-btn::after {
    top: calc(100% + 7px);
    bottom: auto;
    transform: translateX(-50%) translateY(-4px);
  }
  #huz-inline-toolbar.below .huz-inline-btn::before {
    top: calc(100% + 2px);
    bottom: auto;
    transform: translateX(-50%) translateY(-4px);
    border-bottom-color: var(--tooltip-bg);
    border-top-color: transparent;
  }
  #huz-inline-toolbar.below .huz-inline-btn:hover::after,
  #huz-inline-toolbar.below .huz-inline-btn:hover::before {
    transform: translateX(-50%) translateY(0);
  }

  .huz-inline-sep {
    width: 1px;
    height: 16px;
    background: var(--border);
    margin: 0 1px;
    flex-shrink: 0;
    opacity: 0.6;

  /* ─────────────────────────────────────────────────────────────────
     Inline toolbar buttons
  ───────────────────────────────────────────────────────────────── */
  .huz-inline-btn {
    position: relative;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 28px;
    height: 26px;
    border: 1px solid #E5E7EB;

  .huz-inline-btn.active {
    background: #ffffff;
    color: #2563EB;

  /* Base tooltip rules — direction determined by parent .above/.below class */
  .huz-inline-btn::after {
    content: attr(data-tip);
    position: absolute;
    left: 50%;
    background: var(--tooltip-bg);
    color: #fff;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.01em;
    white-space: nowrap;
    padding: 3px 7px;
    border-radius: 5px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.14s ease, transform 0.14s ease;
    z-index: 200;
  }
  .huz-inline-btn::before {
    content: '';
    position: absolute;
    left: 50%;
    border: 4px solid transparent;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.14s ease, transform 0.14s ease;
    z-index: 200;
  }
  /* Default state (above) — these are overridden by the .above / .below rules above */
  .huz-inline-btn::after {
    bottom: calc(100% + 7px);
    transform: translateX(-50%) translateY(4px);
  }
  .huz-inline-btn::before {
    bottom: calc(100% + 2px);
    transform: translateX(-50%) translateY(4px);
    border-top-color: var(--tooltip-bg);
  }
  .huz-inline-btn:hover::after,
  .huz-inline-btn:hover::before {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ─────────────────────────────────────────────────────────────────
     Editor canvas
  ───────────────────────────────────────────────────────────────── */
  #huz-editor {
    flex: 1;
    outline: none;
    padding: 16px 16px 16px 10px;
    font-size: 15px;

</style>

<!-- ─── JAVASCRIPT ─────────────────────────────────────────────────────── -->
<script>
(function () {
  'use strict';

  /* ── DOM refs ─────────────────────────────────────────────────── */
  const editor        = document.getElementById('huz-editor');
  const plusBtn       = document.getElementById('huz-plus-btn');
  const blockMenu     = document.getElementById('huz-block-menu');
  const inlineToolbar = document.getElementById('huz-inline-toolbar');

  /* ── State ────────────────────────────────────────────────────── */
  let activeBlock      = null;
  let menuOpen         = false;
  let savedRange       = null;
  let saveTimer        = null;
  let inlineHideTimer  = null;

  /* ── Inline toolbar measured height (used for adaptive placement) */
  const TOOLBAR_HEIGHT_APPROX = 38;   // px; approximate before first render
  const TOOLBAR_GAP           = 9;    // px gap between toolbar edge and selection edge
  const TOOLBAR_MIN_TOP_SPACE = 10;   // minimum px from iframe top edge before flipping

  /* ══════════════════════════════════════════════════════════════
     INIT — hydrate editor from data-initial-content attribute
  ══════════════════════════════════════════════════════════════ */
  function init () {
    const raw = editor.getAttribute('data-initial-content') || '';
    if (raw && raw !== '#BUBBLE_DYNAMIC_DATA#' && raw.trim() !== '') {
      editor.innerHTML = raw;
    }
  }

  /* ══════════════════════════════════════════════════════════════
     BUBBLE SYNC
  ══════════════════════════════════════════════════════════════ */
  function syncToBubble () {
    clearTimeout(saveTimer);
    saveTimer = setTimeout(function () {
      if (typeof bubble_fn_saveEditorData === 'function') {
        bubble_fn_saveEditorData(editor.innerHTML);
      }
    }, 500);
  }

  function syncNow () {
    clearTimeout(saveTimer);
    if (typeof bubble_fn_saveEditorData === 'function') {
      bubble_fn_saveEditorData(editor.innerHTML);
    }
  }

  /* ══════════════════════════════════════════════════════════════
     GET ACTIVE BLOCK
     BUG FIX 2: Returns the direct child of #huz-editor that contains
     the caret. Works correctly for both element nodes AND raw text
     nodes on the first line (walks parentNode until it finds a direct
     child of editor, regardless of node type).
  ══════════════════════════════════════════════════════════════ */
  function getActiveBlock () {
    const sel = window.getSelection();
    if (!sel || sel.rangeCount === 0) return null;

    let node = sel.anchorNode;

    // Walk up to a direct child of #huz-editor
    while (node && node !== editor) {
      if (node.parentNode === editor) return node;
      node = node.parentNode;
    }

    // Caret is directly inside #huz-editor (e.g. bare text node at root level)
    // This can happen when the editor has raw text without a wrapper element.
    // Return null here — positionPlusBtn will call showOnFirstLine() as fallback.
    return null;
  }

  /* ══════════════════════════════════════════════════════════════
     IS CARET INSIDE EDITOR
     BUG FIX 2: Used to distinguish "null because outside editor" from
     "null because bare text in editor" so we know whether to show the
     + button or hide it.
  ══════════════════════════════════════════════════════════════ */
  function isCaretInsideEditor () {
    const sel = window.getSelection();
    if (!sel || sel.rangeCount === 0) return false;
    const node = sel.anchorNode;
    return node ? editor.contains(node) : false;
  }

  /* ══════════════════════════════════════════════════════════════
     POSITION PLUS BUTTON
     BUG FIX 2: If getActiveBlock() returns null but the caret IS
     inside the editor (e.g. first-line plain text, or bare text node),
     always fall through to showOnFirstLine() instead of hiding.
  ══════════════════════════════════════════════════════════════ */
  function positionPlusBtn (block) {
    if (!block) {
      // BUG FIX 2: only hide when caret is definitively outside the editor
      if (!isCaretInsideEditor()) {
        if (!menuOpen) plusBtn.classList.remove('visible');
      } else {
        // Caret is inside editor but no resolvable block — use first-line fallback
        showOnFirstLine();
      }
      return;
    }

    const edRect = editor.getBoundingClientRect();

    let targetRect = block.getBoundingClientRect();
    if (block.nodeName === 'UL' || block.nodeName === 'OL') {
      const sel = window.getSelection();
      if (sel && sel.rangeCount > 0) {
        let node = sel.anchorNode;
        while (node && node !== block) {
          if (node.nodeName === 'LI') { targetRect = node.getBoundingClientRect(); break; }
          node = node.parentNode;
        }
      }
    }

    const topOffset = targetRect.top - edRect.top + editor.scrollTop;
    const centered  = topOffset + (targetRect.height / 2) - 11;

    setButtonTop(Math.max(0, centered));
    plusBtn.classList.add('visible');
  }

  function showOnFirstLine () {
    const sel = window.getSelection();
    let top;

    if (sel && sel.rangeCount > 0) {
      const caretRect = sel.getRangeAt(0).getBoundingClientRect();
      const edRect    = editor.getBoundingClientRect();
      if (caretRect && caretRect.height > 0) {
        const offset = caretRect.top - edRect.top + editor.scrollTop;
        top = offset + (caretRect.height / 2) - 11;
      }
    }

    if (top === undefined) {
      const lineHeight = parseFloat(getComputedStyle(editor).lineHeight) || 26;
      top = 16 + (lineHeight / 2) - 11;
    }

    setButtonTop(Math.max(0, top));
    plusBtn.classList.add('visible');
  }

  function setButtonTop (px) {
    plusBtn.style.top   = px + 'px';
    blockMenu.style.top = (px + 11) + 'px';
  }

  /* ══════════════════════════════════════════════════════════════
     BLOCK MENU OPEN / CLOSE
  ══════════════════════════════════════════════════════════════ */
  function openMenu () {
    const sel = window.getSelection();
    if (sel && sel.rangeCount > 0) savedRange = sel.getRangeAt(0).cloneRange();

    menuOpen = true;
    blockMenu.classList.add('open');
    plusBtn.classList.add('open');
    plusBtn.setAttribute('aria-expanded', 'true');
  }

  function closeMenu () {
    menuOpen = false;
    blockMenu.classList.remove('open');
    plusBtn.classList.remove('open');
    plusBtn.setAttribute('aria-expanded', 'false');
  }

  plusBtn.addEventListener('mousedown', function (e) {
    e.preventDefault();
    e.stopPropagation();
    menuOpen ? closeMenu() : openMenu();
  });

  document.addEventListener('click', function (e) {
    if (menuOpen && !blockMenu.contains(e.target) && e.target !== plusBtn) {
      closeMenu();
    }
  });

  /* ══════════════════════════════════════════════════════════════
     BLOCK MENU — mousedown handler
  ══════════════════════════════════════════════════════════════ */
  blockMenu.addEventListener('mousedown', function (e) {
    e.preventDefault();

    const btn       = e.target.closest('.huz-menu-btn');
    if (!btn) return;

    const blockType = btn.getAttribute('data-block');
    if (blockType) {
      insertOrConvertBlock(blockType);
      closeMenu();
    }
  });

  /* ══════════════════════════════════════════════════════════════
     INLINE TOOLBAR — adaptive placement engine
     BUG FIX 1: The toolbar now evaluates available space above the
     selection against the editor's client rect and the iframe top edge.
     If there is insufficient room (< TOOLBAR_HEIGHT_APPROX + TOOLBAR_GAP
     + TOOLBAR_MIN_TOP_SPACE px), it flips to render BELOW the selection.
     The horizontal position is clamped within the editor's visible
     client rect so the toolbar never overflows left or right.
     The .above / .below CSS classes on the toolbar control tooltip
     arrow direction to match the flip state.
  ══════════════════════════════════════════════════════════════ */

  function isValidEditorSelection () {
    const sel = window.getSelection();
    if (!sel || sel.rangeCount === 0 || sel.isCollapsed) return false;
    if (sel.toString().length === 0) return false;

    const anchor = sel.anchorNode;
    const focus  = sel.focusNode;
    if (!editor.contains(anchor) || !editor.contains(focus)) return false;

    return true;
  }

  /**
   * Adaptive placement:
   * 1. Read the selection bounding rect (viewport-relative, matches position:fixed).
   * 2. Read the editor bounding rect for horizontal clamping.
   * 3. Determine actual rendered toolbar dimensions via offsetWidth/offsetHeight
   *    (falls back to TOOLBAR_HEIGHT_APPROX if not yet rendered).
   * 4. Try to place ABOVE. If the computed top would go off-screen or overlap the
   *    iframe top edge by less than TOOLBAR_MIN_TOP_SPACE, flip to BELOW.
   * 5. Clamp left to keep the toolbar within the editor's horizontal bounds.
   */
  function showInlineToolbar () {
    if (!isValidEditorSelection()) {
      hideInlineToolbar();
      return;
    }

    const sel     = window.getSelection();
    const selRect = sel.getRangeAt(0).getBoundingClientRect();
    const edRect  = editor.getBoundingClientRect();

    // Use actual rendered dimensions when available
    const tbW = inlineToolbar.offsetWidth  || 200;
    const tbH = inlineToolbar.offsetHeight || TOOLBAR_HEIGHT_APPROX;

    // ── Vertical placement ──────────────────────────────────────────
    const topIfAbove = selRect.top - tbH - TOOLBAR_GAP;
    const topIfBelow = selRect.bottom + TOOLBAR_GAP;

    let top;
    let placedAbove;

    if (topIfAbove >= TOOLBAR_MIN_TOP_SPACE) {
      // Enough room above — preferred position
      top = topIfAbove;
      placedAbove = true;
    } else {
      // Not enough room above — flip below
      top = topIfBelow;
      placedAbove = false;
    }

    // ── Horizontal placement ────────────────────────────────────────
    // Center over the selection, then clamp within the editor's client rect.
    // Left edge must be at least edRect.left + 4px from the editor start.
    // Right edge must not exceed edRect.right - 4px.
    const selCenterX = selRect.left + selRect.width / 2;
    let left = selCenterX - tbW / 2;

    const minLeft = edRect.left + 4;
    const maxLeft = edRect.right - tbW - 4;

    left = Math.max(left, minLeft);
    left = Math.min(left, Math.max(maxLeft, minLeft)); // keep min as floor even if editor is very narrow

    // ── Apply position ──────────────────────────────────────────────
    inlineToolbar.style.left      = left + 'px';
    inlineToolbar.style.top       = top  + 'px';
    inlineToolbar.style.transform = 'translateY(0)';

    // Toggle direction class for tooltip arrow CSS
    if (placedAbove) {
      inlineToolbar.classList.remove('below');
      inlineToolbar.classList.add('above');
    } else {
      inlineToolbar.classList.remove('above');
      inlineToolbar.classList.add('below');
    }

    updateInlineBtnStates();
    inlineToolbar.classList.add('visible');
  }

  function hideInlineToolbar () {
    inlineToolbar.classList.remove('visible');
  }

  function scheduleHideInlineToolbar () {
    clearTimeout(inlineHideTimer);
    inlineHideTimer = setTimeout(function () {
      if (!isValidEditorSelection()) hideInlineToolbar();
    }, 80);
  }

  /* Listen for selection changes anywhere in the document */
  document.addEventListener('selectionchange', function () {
    const sel = window.getSelection();
    if (!sel) return;

    const anchor = sel.anchorNode;
    if (anchor && editor.contains(anchor)) {
      if (sel.isCollapsed || sel.toString().length === 0) {
        scheduleHideInlineToolbar();
      } else {
        clearTimeout(inlineHideTimer);
        showInlineToolbar();
      }
    } else {
      scheduleHideInlineToolbar();
    }
  });

  /* Catch keyboard-extended selections */
  editor.addEventListener('keyup', function (e) {
    if (e.shiftKey || e.key === 'Home' || e.key === 'End') {
      if (isValidEditorSelection()) {
        showInlineToolbar();
      } else {
        hideInlineToolbar();
      }
    }
  });

  /* ──────────────────────────────────────────────────────────────
     Inline toolbar button interactions
  ─────────────────────────────────────────────────────────────── */
  inlineToolbar.addEventListener('mousedown', function (e) {
    e.preventDefault();

    const btn       = e.target.closest('.huz-inline-btn');
    const clearBtn  = e.target.closest('#huz-inline-clear');

    if (!btn) return;

    if (clearBtn) {
      document.execCommand('removeFormat', false, null);
      updateInlineBtnStates();
      syncToBubble();
      scheduleHideInlineToolbar();
      return;
    }

    const cmd = btn.getAttribute('data-cmd');
    if (cmd) {
      document.execCommand(cmd, false, null);
      updateInlineBtnStates();
      syncToBubble();
    }
  });

  /* ══════════════════════════════════════════════════════════════
     INSERT / CONVERT BLOCK
  ══════════════════════════════════════════════════════════════ */
  function insertOrConvertBlock (type) {
    editor.focus();
    restoreRange();

    const cur = getActiveBlock();

    if (type === 'hr') {
      const hr = document.createElement('hr');
      const p  = document.createElement('p'); p.innerHTML = '<br>';
      insertAfter(hr, cur);
      hr.parentNode.insertBefore(p, hr.nextSibling);
      placeCursorIn(p);

    } else if (type === 'ul' || type === 'ol') {
      const list = document.createElement(type);
      const li   = document.createElement('li');
      li.innerHTML = (cur ? cur.innerHTML : null) || '<br>';
      list.appendChild(li);
      if (cur && cur.parentNode === editor) {
        editor.replaceChild(list, cur);
      } else {
        insertAfter(list, cur);
      }
      placeCursorIn(li);

    } else {
      /* p, h1, h2, h3 */
      if (cur && cur.parentNode === editor) {
        const el = document.createElement(type);
        el.innerHTML = cur.innerHTML || '<br>';
        editor.replaceChild(el, cur);
        activeBlock = el;
        placeCursorIn(el);
        positionPlusBtn(el);
      } else {
        const el = document.createElement(type);
        el.innerHTML = '<br>';
        insertAfter(el, cur);
        placeCursorIn(el);
      }
    }

    syncToBubble();
  }

  /* ── Helpers ─────────────────────────────────────────────────── */

  function restoreRange () {
    if (!savedRange) return;
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(savedRange);
  }

  function insertAfter (node, ref) {
    if (ref && ref.parentNode === editor) {
      editor.insertBefore(node, ref.nextSibling);
    } else {
      editor.appendChild(node);
    }
  }

  function placeCursorIn (el) {
    const sel   = window.getSelection();
    const range = document.createRange();
    let target  = el;
    while (target.firstChild) target = target.firstChild;
    try {
      range.setStart(target, 0);
      range.collapse(true);
    } catch (_) {
      range.selectNodeContents(el);
      range.collapse(false);
    }
    sel.removeAllRanges();
    sel.addRange(range);
  }

  function updateInlineBtnStates () {
    ['bold', 'italic', 'underline', 'strikeThrough'].forEach(function (cmd) {
      const btn = inlineToolbar.querySelector('[data-cmd="' + cmd + '"]');
      if (btn) btn.classList.toggle('active', document.queryCommandState(cmd));
    });
  }

  /* ══════════════════════════════════════════════════════════════
     EDITOR EVENT LISTENERS
     BUG FIX 2: onCursorMove now calls isCaretInsideEditor() before
     deciding to hide the + button. If getActiveBlock() returns null
     but the caret is still inside the editor, positionPlusBtn(null)
     will call showOnFirstLine() rather than hiding.
  ══════════════════════════════════════════════════════════════ */

  function onCursorMove () {
    activeBlock = getActiveBlock();
    positionPlusBtn(activeBlock);
  }

  editor.addEventListener('keyup',   onCursorMove);
  editor.addEventListener('mouseup', onCursorMove);

  editor.addEventListener('focus', function () {
    // BUG FIX 2: Use a short setTimeout to allow the browser to settle the
    // selection/caret after focus events. Without this, getActiveBlock() can
    // return null because anchorNode is not yet set, causing positionPlusBtn
    // to hide the button incorrectly.
    setTimeout(function () {
      activeBlock = getActiveBlock();
      // If block is null but focus is confirmed on the editor, force showOnFirstLine
      if (!activeBlock && document.activeElement === editor) {
        showOnFirstLine();
      } else {
        positionPlusBtn(activeBlock);
      }
    }, 0);
  });

  editor.addEventListener('click', function () {
    // BUG FIX 2: Same setTimeout guard as focus — click events fire before
    // the selection is updated in some browsers, causing a transient null
    // from getActiveBlock() on the very first line.
    setTimeout(function () {
      activeBlock = getActiveBlock();
      if (!activeBlock && isCaretInsideEditor()) {
        showOnFirstLine();
      } else {
        positionPlusBtn(activeBlock);
      }
    }, 0);
  });

  editor.addEventListener('input', function () {
    activeBlock = getActiveBlock();
    positionPlusBtn(activeBlock);
    syncToBubble();
  });

  editor.addEventListener('blur', function (e) {
    if (blockMenu.contains(e.relatedTarget) || e.relatedTarget === plusBtn) return;
    if (inlineToolbar.contains(e.relatedTarget)) return;

    plusBtn.classList.remove('visible');
    closeMenu();
    syncNow();
  });

  /* ── Keyboard shortcuts ──────────────────────────────────────── */
  editor.addEventListener('keydown', function (e) {

    if (e.key === 'Tab') {
      e.preventDefault();
      document.execCommand(e.shiftKey ? 'outdent' : 'indent', false, null);
      return;
    }

    if (e.key === 'Escape') { closeMenu(); hideInlineToolbar(); return; }

    if (e.key === 'Enter') {
      const block = getActiveBlock();
      if (block && /^H[1-3]$/.test(block.nodeName)) {
        e.preventDefault();
        const p = document.createElement('p');
        p.innerHTML = '<br>';
        editor.insertBefore(p, block.nextSibling);
        placeCursorIn(p);
        syncToBubble();
      }
    }

    if (!e.shiftKey && !e.ctrlKey && !e.metaKey && !e.altKey) {
      if (['ArrowLeft','ArrowRight','ArrowUp','ArrowDown','Home','End'].includes(e.key)) {
        scheduleHideInlineToolbar();
      }
    }

  });

  /* ══════════════════════════════════════════════════════════════
     BOOT
  ══════════════════════════════════════════════════════════════ */
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }

})();
</script>
