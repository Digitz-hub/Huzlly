<style>
  /* ═══════════════════════════════════════════════════════════════════
     PERF FIX — CRITICAL CURSOR RULES (must stay BEFORE @import)
  ═══════════════════════════════════════════════════════════════════ */
  .huz-wrap,
  .huz-editor-body,
  #huz-editor {
    cursor: text;
    color-scheme: light;
  }
  #huz-plus-btn,
  .huz-menu-btn,
  .huz-inline-btn {
    cursor: pointer;
  }

  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:          #ffffff;
    --surface:     #f7f7f5;
    --border:      #e8e8e4;
    --text:        #1a1a18;
    --text-muted:  #9b9b97;
    --accent:      #534AB7;
    --accent-soft: #eeecfb;
    --plus-idle:   #c7c7c2;
    --plus-active: #534AB7;
    --menu-shadow: 0 6px 28px rgba(0,0,0,0.10), 0 1.5px 5px rgba(0,0,0,0.06);
    --tooltip-bg:  #1a1a18;
    --radius:      8px;
    --font-body:   'DM Sans', system-ui, sans-serif;
    --font-mono:   'JetBrains Mono', 'Fira Mono', monospace;
    --t:           0.15s ease;
  }

  .huz-wrap {
    position: relative;
    font-family: var(--font-body);
    color: var(--text);
    background: var(--bg);
    border: none;
    border-radius: var(--radius);
    resize: vertical;
    overflow-x: hidden;
    overflow-y: auto;
    min-height: 180px;
  }

  .huz-editor-body {
    display: flex;
    min-height: inherit;
  }

  .huz-plus-col {
    width: 22px;
    flex-shrink: 0;
    position: relative;
  }

  /* ─────────────────────────────────────────────────────────────────
     Plus button
  ───────────────────────────────────────────────────────────────── */
  #huz-plus-btn {
    position: absolute;
    left: 3px;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 1.5px solid var(--plus-idle);
    background: #fff;
    color: var(--plus-idle);
    font-size: 19px;
    font-weight: 300;
    line-height: 1;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.12s ease,
                color 0.15s ease,
                transform 0.2s ease;
    z-index: 20;
    user-select: none;
    transform: rotate(0deg);
  }
  #huz-plus-btn.visible {
    opacity: 1;
    pointer-events: all;
  }

  #huz-plus-btn:hover:not(.open) {
    border-color: var(--plus-idle);
    color: #1a1a18;
  }

  #huz-plus-btn.open {
    border-color: var(--plus-idle);
    color: var(--plus-idle);
    transform: rotate(45deg);
  }

  #huz-plus-btn.open:hover {
    border-color: var(--plus-idle);
    color: #1a1a18;
  }

  /* ─────────────────────────────────────────────────────────────────
     Block menu — structural blocks only (no inline format buttons)
     Child count after cleanup: H1, H2, H3, sep, UL, OL, HR = 7 items + 1 sep = 8 children
  ───────────────────────────────────────────────────────────────── */
  #huz-block-menu {
    position: absolute;
    left: 38px;
    top: 0;
    display: flex;
    flex-direction: row;
    align-items: center;
    gap: 4px;
    padding: 0;
    background: transparent;
    border: none;
    border-radius: 0;
    box-shadow: none;
    z-index: 100;
    white-space: nowrap;
    visibility: hidden;
    opacity: 0;
    transform: translateY(-50%);
    transform-origin: left center;
    transition: opacity 0.18s ease,
                visibility 0s linear 0.18s;
    pointer-events: none;
  }
  #huz-block-menu.open {
    visibility: visible;
    opacity: 1;
    pointer-events: all;
    transition: opacity 0.18s ease,
                visibility 0s linear 0s;
  }

  /* Staggered reveal — 8 children max (H1, H2, H3, sep, UL, OL, —, sep) */
  #huz-block-menu > * {
    opacity: 0;
    transform: translateX(-6px);
    transition: opacity 0.18s ease, transform 0.18s ease;
  }
  #huz-block-menu.open > *:nth-child(1) { opacity: 1; transform: translateX(0); transition-delay: 0ms;   }
  #huz-block-menu.open > *:nth-child(2) { opacity: 1; transform: translateX(0); transition-delay: 22ms;  }
  #huz-block-menu.open > *:nth-child(3) { opacity: 1; transform: translateX(0); transition-delay: 44ms;  }
  #huz-block-menu.open > *:nth-child(4) { opacity: 1; transform: translateX(0); transition-delay: 56ms;  }
  #huz-block-menu.open > *:nth-child(5) { opacity: 1; transform: translateX(0); transition-delay: 68ms;  }
  #huz-block-menu.open > *:nth-child(6) { opacity: 1; transform: translateX(0); transition-delay: 80ms;  }
  #huz-block-menu.open > *:nth-child(7) { opacity: 1; transform: translateX(0); transition-delay: 92ms;  }
  #huz-block-menu.open > *:nth-child(8) { opacity: 1; transform: translateX(0); transition-delay: 104ms; }

  /* Thin vertical separator */
  .huz-menu-sep {
    width: 1px;
    height: 18px;
    background: var(--border);
    margin: 0 2px;
    flex-shrink: 0;
    opacity: 0.6;
  }

  /* ─────────────────────────────────────────────────────────────────
     Block menu buttons — structural blocks only
  ───────────────────────────────────────────────────────────────── */
  .huz-menu-btn {
    position: relative;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 30px;
    height: 28px;
    border: 1px solid #E5E7EB;
    border-radius: 999px;
    background: #ffffff;
    cursor: pointer;
    font-size: 11px;
    font-weight: 700;
    font-family: var(--font-body);
    line-height: 1;
    color: var(--text-muted);
    transition: color var(--t);
    user-select: none;
    flex-shrink: 0;
    padding-bottom: 1px;
  }

  .huz-menu-btn:hover {
    background: #ffffff;
    color: #1a1a18;
    border-color: #E5E7EB;
  }

  /* Tooltip label — appears BELOW button */
  .huz-menu-btn::after {
    content: attr(data-tip);
    position: absolute;
    top: calc(100% + 7px);
    left: 50%;
    transform: translateX(-50%) translateY(-4px);
    background: var(--tooltip-bg);
    color: #fff;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.01em;
    white-space: nowrap;
    padding: 3px 7px;
    border-radius: 5px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.14s ease, transform 0.14s ease;
    z-index: 200;
  }
  .huz-menu-btn::before {
    content: '';
    position: absolute;
    top: calc(100% + 2px);
    left: 50%;
    transform: translateX(-50%) translateY(-4px);
    border: 4px solid transparent;
    border-bottom-color: var(--tooltip-bg);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.14s ease, transform 0.14s ease;
    z-index: 200;
  }
  .huz-menu-btn:hover::after,
  .huz-menu-btn:hover::before {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  .huz-menu-btn svg {
    width: 14px;
    height: 14px;
    display: block;
    flex-shrink: 0;
  }

  /* ═══════════════════════════════════════════════════════════════════
     INLINE FORMATTING POPOVER — #huz-inline-toolbar
     Floats above selected text. Position driven by JS.
  ═══════════════════════════════════════════════════════════════════ */
  #huz-inline-toolbar {
    position: fixed;
    display: flex;
    flex-direction: row;
    align-items: center;
    gap: 3px;
    padding: 4px 6px;
    background: #ffffff;
    border: 1px solid #E5E7EB;
    border-radius: 999px;
    box-shadow: 0 4px 16px rgba(0, 0, 0, 0.10), 0 1px 4px rgba(0, 0, 0, 0.06);
    z-index: 9999;
    white-space: nowrap;
    /* Hidden by default */
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
    transform: translateY(4px);
    transition: opacity 0.14s ease,
                visibility 0s linear 0.14s,
                transform 0.14s ease;
  }

  #huz-inline-toolbar.visible {
    opacity: 1;
    visibility: visible;
    pointer-events: all;
    transform: translateY(0);
    transition: opacity 0.14s ease,
                visibility 0s linear 0s,
                transform 0.14s ease;
  }

  /* Thin vertical separator inside inline toolbar */
  .huz-inline-sep {
    width: 1px;
    height: 16px;
    background: var(--border);
    margin: 0 1px;
    flex-shrink: 0;
    opacity: 0.6;
  }

  /* ─────────────────────────────────────────────────────────────────
     Inline toolbar buttons — identical design language to .huz-menu-btn
  ───────────────────────────────────────────────────────────────── */
  .huz-inline-btn {
    position: relative;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 28px;
    height: 26px;
    border: 1px solid #E5E7EB;
    border-radius: 999px;
    background: #ffffff;
    cursor: pointer;
    font-size: 11px;
    font-weight: 700;
    font-family: var(--font-body);
    line-height: 1;
    color: var(--text-muted);
    transition: color var(--t), border-color var(--t);
    user-select: none;
    flex-shrink: 0;
    padding-bottom: 1px;

  .huz-inline-btn:hover {
    background: #ffffff;
    color: #1a1a18;
    border-color: #D1D5DB;
  }

  .huz-inline-btn.active {
    background: #ffffff;
    color: #2563EB;
    border-color: #BFDBFE;
  }

  /* Tooltip — appears ABOVE the inline toolbar (since toolbar is above selection) */
  .huz-inline-btn::after {
    content: attr(data-tip);
    position: absolute;
    bottom: calc(100% + 7px);
    left: 50%;
    transform: translateX(-50%) translateY(4px);
    background: var(--tooltip-bg);
    color: #fff;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.01em;
    white-space: nowrap;
    padding: 3px 7px;
    border-radius: 5px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.14s ease, transform 0.14s ease;
    z-index: 200;
  }
  /* Arrow pointing DOWN (toward the button) */
  .huz-inline-btn::before {
    content: '';
    position: absolute;
    bottom: calc(100% + 2px);
    left: 50%;
    transform: translateX(-50%) translateY(4px);
    border: 4px solid transparent;
    border-top-color: var(--tooltip-bg);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.14s ease, transform 0.14s ease;
    z-index: 200;
  }
  .huz-inline-btn:hover::after,
  .huz-inline-btn:hover::before {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ─────────────────────────────────────────────────────────────────
     Editor canvas
  ───────────────────────────────────────────────────────────────── */
  #huz-editor {
    flex: 1;
    outline: none;
    padding: 16px 16px 16px 10px;
    font-size: 15px;
    line-height: 1.75;
    color: var(--text);
    font-family: var(--font-body);
    word-break: break-word;
    min-height: 180px;
    caret-color: #1a1a18;
    cursor: text;
    color-scheme: light;
  }
  #huz-editor:empty::before {
    content: attr(data-placeholder);
    color: var(--text-muted);
    pointer-events: none;
    user-select: none;
  }

  /* ── Block styles ── */
  #huz-editor h1 { font-size: 1.75em; font-weight: 700; line-height: 1.2; margin: 8px 0 4px; }
  #huz-editor h2 { font-size: 1.3em;  font-weight: 600; line-height: 1.3; margin: 6px 0 3px; }
  #huz-editor h3 { font-size: 1.1em;  font-weight: 600; line-height: 1.4; margin: 4px 0 2px; }
  #huz-editor ul, #huz-editor ol { padding-left: 1.5em; margin: 2px 0; }
  #huz-editor li { margin: 2px 0; }
  #huz-editor blockquote {
    border-left: 3px solid var(--accent);

    color: var(--text-muted);
    font-style: italic;

  #huz-editor code {
    background: var(--surface);
    border: 1px solid var(--border);

  #huz-editor pre {
    background: #1e1e2e;
    color: #cdd6f4;

    padding: 12px 15px;

    margin: 6px 0;

  #huz-editor hr { border: none; border-top: 1.5px solid var(--border); margin: 10px 0; }
  #huz-editor p  { margin: 0; }
  #huz-editor b, #huz-editor strong { font-weight: 600; }

  #huz-editor u  { text-decoration: underline; }
  #huz-editor s  { text-decoration: line-through; color: var(--text-muted); }
</style>

<!-- ─── JAVASCRIPT ─────────────────────────────────────────────────────── -->
<script>
(function () {
  'use strict';

  /* ── DOM refs ─────────────────────────────────────────────────── */
  const editor        = document.getElementById('huz-editor');
  const plusBtn       = document.getElementById('huz-plus-btn');
  const blockMenu     = document.getElementById('huz-block-menu');
  const inlineToolbar = document.getElementById('huz-inline-toolbar');

  /* ── State ────────────────────────────────────────────────────── */
  let activeBlock      = null;
  let menuOpen         = false;
  let savedRange       = null;
  let saveTimer        = null;
  let inlineHideTimer  = null;   // debounce for hiding the inline toolbar

  /* ══════════════════════════════════════════════════════════════
     INIT — hydrate editor from data-initial-content attribute
  ══════════════════════════════════════════════════════════════ */
  function init () {
    const raw = editor.getAttribute('data-initial-content') || '';
    if (raw && raw !== '#BUBBLE_DYNAMIC_DATA#' && raw.trim() !== '') {
      editor.innerHTML = raw;
    }
  }

  /* ══════════════════════════════════════════════════════════════
     BUBBLE SYNC
  ══════════════════════════════════════════════════════════════ */
  function syncToBubble () {
    clearTimeout(saveTimer);
    saveTimer = setTimeout(function () {
      if (typeof bubble_fn_saveEditorData === 'function') {
        bubble_fn_saveEditorData(editor.innerHTML);
      }
    }, 500);
  }

  function syncNow () {
    clearTimeout(saveTimer);
    if (typeof bubble_fn_saveEditorData === 'function') {
      bubble_fn_saveEditorData(editor.innerHTML);
    }
  }

  /* ══════════════════════════════════════════════════════════════
     GET ACTIVE BLOCK
  ══════════════════════════════════════════════════════════════ */
  function getActiveBlock () {
    const sel = window.getSelection();
    if (!sel || sel.rangeCount === 0) return null;
    let node = sel.anchorNode;
    while (node && node.parentNode !== editor) node = node.parentNode;
    return (node && node !== editor) ? node : null;
  }

  /* ══════════════════════════════════════════════════════════════
     POSITION PLUS BUTTON
  ══════════════════════════════════════════════════════════════ */
  function positionPlusBtn (block) {
    if (!block) {
      if (document.activeElement !== editor) {
        if (!menuOpen) plusBtn.classList.remove('visible');
      } else {
        showOnFirstLine();
      }
      return;
    }

    const edRect = editor.getBoundingClientRect();

    let targetRect = block.getBoundingClientRect();
    if (block.nodeName === 'UL' || block.nodeName === 'OL') {
      const sel = window.getSelection();
      if (sel && sel.rangeCount > 0) {
        let node = sel.anchorNode;
        while (node && node !== block) {
          if (node.nodeName === 'LI') { targetRect = node.getBoundingClientRect(); break; }
          node = node.parentNode;
        }
      }
    }

    const topOffset = targetRect.top - edRect.top + editor.scrollTop;
    const centered  = topOffset + (targetRect.height / 2) - 11;

    setButtonTop(Math.max(0, centered));
    plusBtn.classList.add('visible');
  }

  function showOnFirstLine () {
    const sel = window.getSelection();
    let top;

    if (sel && sel.rangeCount > 0) {
      const caretRect = sel.getRangeAt(0).getBoundingClientRect();
      const edRect    = editor.getBoundingClientRect();
      if (caretRect && caretRect.height > 0) {
        const offset = caretRect.top - edRect.top + editor.scrollTop;
        top = offset + (caretRect.height / 2) - 11;
      }
    }

    if (top === undefined) {
      const lineHeight = parseFloat(getComputedStyle(editor).lineHeight) || 26;
      top = 16 + (lineHeight / 2) - 11;
    }

    setButtonTop(Math.max(0, top));
    plusBtn.classList.add('visible');
  }

  function setButtonTop (px) {
    plusBtn.style.top   = px + 'px';
    blockMenu.style.top = (px + 11) + 'px';
  }

  /* ══════════════════════════════════════════════════════════════
     BLOCK MENU OPEN / CLOSE
  ══════════════════════════════════════════════════════════════ */
  function openMenu () {
    const sel = window.getSelection();
    if (sel && sel.rangeCount > 0) savedRange = sel.getRangeAt(0).cloneRange();

    menuOpen = true;
    blockMenu.classList.add('open');
    plusBtn.classList.add('open');
    plusBtn.setAttribute('aria-expanded', 'true');
  }

  function closeMenu () {
    menuOpen = false;
    blockMenu.classList.remove('open');
    plusBtn.classList.remove('open');
    plusBtn.setAttribute('aria-expanded', 'false');
  }

  plusBtn.addEventListener('mousedown', function (e) {
    e.preventDefault();
    e.stopPropagation();
    menuOpen ? closeMenu() : openMenu();
  });

  document.addEventListener('click', function (e) {
    if (menuOpen && !blockMenu.contains(e.target) && e.target !== plusBtn) {
      closeMenu();
    }
  });

  /* ══════════════════════════════════════════════════════════════
     BLOCK MENU — mousedown handler (structural blocks only)
  ══════════════════════════════════════════════════════════════ */
  blockMenu.addEventListener('mousedown', function (e) {
    e.preventDefault();

    const btn       = e.target.closest('.huz-menu-btn');
    if (!btn) return;

    const blockType = btn.getAttribute('data-block');
    if (blockType) {
      insertOrConvertBlock(blockType);
      closeMenu();
    }
  });

  /* ══════════════════════════════════════════════════════════════
     INLINE TOOLBAR — selection-driven positioning & state machine
  ══════════════════════════════════════════════════════════════ */

  /**
   * Determines whether the current selection is a valid non-collapsed
   * text selection entirely within #huz-editor.
   */
  function isValidEditorSelection () {
    const sel = window.getSelection();
    if (!sel || sel.rangeCount === 0 || sel.isCollapsed) return false;
    if (sel.toString().length === 0) return false;

    // Verify both anchor and focus are inside the editor
    const anchor = sel.anchorNode;
    const focus  = sel.focusNode;
    if (!editor.contains(anchor) || !editor.contains(focus)) return false;

    return true;
  }

  /**
   * Positions and shows the inline toolbar centered above the selection rect.
   * Uses position:fixed + getBoundingClientRect (viewport coords) so it works
   * correctly inside Bubble's iframe regardless of page scroll.
   */
  function showInlineToolbar () {
    if (!isValidEditorSelection()) {
      hideInlineToolbar();
      return;
    }

    const sel  = window.getSelection();
    const rect = sel.getRangeAt(0).getBoundingClientRect();

    // Toolbar dimensions (approximate before render; 8px gap above selection)
    const toolbarHeight = 38;   // approximate; actual may vary by 2-4px
    const GAP           = 9;    // px gap between toolbar bottom and selection top

    // Center horizontally over selection, clamp within viewport
    let left = rect.left + (rect.width / 2);
    let top  = rect.top - toolbarHeight - GAP;

    // Clamp: prevent going off left edge
    left = Math.max(left, 80);

    inlineToolbar.style.left = left + 'px';
    inlineToolbar.style.top  = top  + 'px';
    inlineToolbar.style.transform = 'translateX(-50%) translateY(0)';

    updateInlineBtnStates();
    inlineToolbar.classList.add('visible');
  }

  /**
   * Hides the inline toolbar.
   */
  function hideInlineToolbar () {
    inlineToolbar.classList.remove('visible');
  }

  /**
   * Debounced hide — prevents flickering during rapid mousedown → mouseup cycles.
   */
  function scheduleHideInlineToolbar () {
    clearTimeout(inlineHideTimer);
    inlineHideTimer = setTimeout(function () {
      if (!isValidEditorSelection()) hideInlineToolbar();
    }, 80);
  }

  /* Listen for selection changes anywhere in the document */
  document.addEventListener('selectionchange', function () {
    // Only react to selections within our editor
    const sel = window.getSelection();
    if (!sel) return;

    // Check if selection involves the editor at all
    const anchor = sel.anchorNode;
    if (anchor && editor.contains(anchor)) {
      if (sel.isCollapsed || sel.toString().length === 0) {
        scheduleHideInlineToolbar();
      } else {
        clearTimeout(inlineHideTimer);
        showInlineToolbar();
      }
    } else {
      // Selection moved outside editor — hide
      scheduleHideInlineToolbar();
    }
  });

  /* Also catch keyboard-extended selections */
  editor.addEventListener('keyup', function (e) {
    // Shift + arrows / Home / End / etc. can create selections via keyboard
    if (e.shiftKey || e.key === 'Home' || e.key === 'End') {
      if (isValidEditorSelection()) {
        showInlineToolbar();
      } else {
        hideInlineToolbar();
      }
    }
  });

  /* ──────────────────────────────────────────────────────────────
     Inline toolbar button interactions
     mousedown + preventDefault preserves the active selection range.
  ─────────────────────────────────────────────────────────────── */
  inlineToolbar.addEventListener('mousedown', function (e) {
    // Prevent focus loss from the editor so selection is preserved
    e.preventDefault();

    const btn       = e.target.closest('.huz-inline-btn');
    const clearBtn  = e.target.closest('#huz-inline-clear');

    if (!btn) return;

    if (clearBtn) {
      document.execCommand('removeFormat', false, null);
      updateInlineBtnStates();
      syncToBubble();
      // Selection is likely collapsed after clear — hide toolbar
      scheduleHideInlineToolbar();
      return;
    }

    const cmd = btn.getAttribute('data-cmd');
    if (cmd) {
      document.execCommand(cmd, false, null);
      updateInlineBtnStates();
      syncToBubble();
    }
  });

  /* ══════════════════════════════════════════════════════════════
     INSERT / CONVERT BLOCK
  ══════════════════════════════════════════════════════════════ */
  function insertOrConvertBlock (type) {
    editor.focus();
    restoreRange();

    const cur = getActiveBlock();

    if (type === 'hr') {
      const hr = document.createElement('hr');
      const p  = document.createElement('p'); p.innerHTML = '<br>';
      insertAfter(hr, cur);
      hr.parentNode.insertBefore(p, hr.nextSibling);
      placeCursorIn(p);

    } else if (type === 'ul' || type === 'ol') {
      const list = document.createElement(type);
      const li   = document.createElement('li');
      li.innerHTML = (cur ? cur.innerHTML : null) || '<br>';
      list.appendChild(li);
      if (cur && cur.parentNode === editor) {
        editor.replaceChild(list, cur);
      } else {
        insertAfter(list, cur);
      }
      placeCursorIn(li);

    } else {
      /* p, h1, h2, h3 */
      if (cur && cur.parentNode === editor) {
        const el = document.createElement(type);
        el.innerHTML = cur.innerHTML || '<br>';
        editor.replaceChild(el, cur);
        activeBlock = el;
        placeCursorIn(el);
        positionPlusBtn(el);
      } else {
        const el = document.createElement(type);
        el.innerHTML = '<br>';
        insertAfter(el, cur);
        placeCursorIn(el);
      }
    }

    syncToBubble();
  }

  /* ── Helpers ─────────────────────────────────────────────────── */

  function restoreRange () {
    if (!savedRange) return;
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(savedRange);
  }

  function insertAfter (node, ref) {
    if (ref && ref.parentNode === editor) {
      editor.insertBefore(node, ref.nextSibling);
    } else {
      editor.appendChild(node);
    }
  }

  function placeCursorIn (el) {
    const sel   = window.getSelection();
    const range = document.createRange();
    let target  = el;
    while (target.firstChild) target = target.firstChild;
    try {
      range.setStart(target, 0);
      range.collapse(true);
    } catch (_) {
      range.selectNodeContents(el);
      range.collapse(false);
    }
    sel.removeAllRanges();
    sel.addRange(range);
  }

  function updateInlineBtnStates () {
    ['bold', 'italic', 'underline', 'strikeThrough'].forEach(function (cmd) {
      const btn = inlineToolbar.querySelector('[data-cmd="' + cmd + '"]');
      if (btn) btn.classList.toggle('active', document.queryCommandState(cmd));
    });
  }

  /* ══════════════════════════════════════════════════════════════
     EDITOR EVENT LISTENERS
  ══════════════════════════════════════════════════════════════ */

  function onCursorMove () {
    activeBlock = getActiveBlock();
    positionPlusBtn(activeBlock);
  }

  editor.addEventListener('keyup',   onCursorMove);
  editor.addEventListener('mouseup', onCursorMove);

  editor.addEventListener('focus', function () {
    setTimeout(function () {
      activeBlock = getActiveBlock();
      positionPlusBtn(activeBlock);
    }, 0);
  });

  editor.addEventListener('click', function () {
    setTimeout(function () {
      activeBlock = getActiveBlock();
      positionPlusBtn(activeBlock);
    }, 0);
  });

  editor.addEventListener('input', function () {
    activeBlock = getActiveBlock();
    positionPlusBtn(activeBlock);
    syncToBubble();
  });

  editor.addEventListener('blur', function (e) {
    // Don't close block menu if focus is moving into the menus
    if (blockMenu.contains(e.relatedTarget) || e.relatedTarget === plusBtn) return;
    // Don't hide inline toolbar if focus moves to inline toolbar (mousedown prevented default so this
    // shouldn't fire, but guard here for safety)
    if (inlineToolbar.contains(e.relatedTarget)) return;

    plusBtn.classList.remove('visible');
    closeMenu();
    syncNow();
  });

  /* ── Keyboard shortcuts ──────────────────────────────────────── */
  editor.addEventListener('keydown', function (e) {

    if (e.key === 'Tab') {
      e.preventDefault();
      document.execCommand(e.shiftKey ? 'outdent' : 'indent', false, null);
      return;
    }

    if (e.key === 'Escape') { closeMenu(); hideInlineToolbar(); return; }

    if (e.key === 'Enter') {
      const block = getActiveBlock();
      if (block && /^H[1-3]$/.test(block.nodeName)) {
        e.preventDefault();
        const p = document.createElement('p');
        p.innerHTML = '<br>';
        editor.insertBefore(p, block.nextSibling);
        placeCursorIn(p);
        syncToBubble();
      }
    }

    // Any non-modifier keydown while no shift = likely navigation, hide toolbar
    if (!e.shiftKey && !e.ctrlKey && !e.metaKey && !e.altKey) {
      if (['ArrowLeft','ArrowRight','ArrowUp','ArrowDown','Home','End'].includes(e.key)) {
        scheduleHideInlineToolbar();
      }
    }

  });

  /* ══════════════════════════════════════════════════════════════
     BOOT
  ══════════════════════════════════════════════════════════════ */
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }

})();
</script>
