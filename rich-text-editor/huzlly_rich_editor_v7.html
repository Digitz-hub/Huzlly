<style>
  /* ═══════════════════════════════════════════════════════════════════
     PERF FIX — CRITICAL CURSOR RULES (must stay BEFORE @import)
  ═══════════════════════════════════════════════════════════════════ */
  .huz-wrap,
  .huz-editor-body,
  #huz-editor {
    cursor: text;
    color-scheme: light;
  }
  #huz-plus-btn,
  .huz-menu-btn,
  #huz-clear-fmt {
    cursor: pointer;
  }

  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:          #ffffff;
    --surface:     #f7f7f5;
    --border:      #e8e8e4;
    --text:        #1a1a18;
    --text-muted:  #9b9b97;
    --accent:      #534AB7;
    --accent-soft: #eeecfb;
    --plus-idle:   #c7c7c2;
    --plus-active: #534AB7;
    --menu-shadow: 0 6px 28px rgba(0,0,0,0.10), 0 1.5px 5px rgba(0,0,0,0.06);
    --tooltip-bg:  #1a1a18;
    --radius:      8px;
    --font-body:   'DM Sans', system-ui, sans-serif;
    --font-mono:   'JetBrains Mono', 'Fira Mono', monospace;
    --t:           0.15s ease;
  }

  .huz-wrap {
    position: relative;
    font-family: var(--font-body);
    color: var(--text);
    background: var(--bg);
    border: none;
    border-radius: var(--radius);
    resize: vertical;
    overflow-x: hidden;
    overflow-y: auto;
    min-height: 180px;
  }

  .huz-editor-body {
    display: flex;
    min-height: inherit;
  }

  .huz-plus-col {
    width: 22px;
    flex-shrink: 0;
    position: relative;
  }

  /* ─────────────────────────────────────────────────────────────────
     Plus button: 3px left offset for border breathing room.
     [CHANGE 1D] font-size increased from 16px to 19px for larger symbol.
     [CHANGE 1B/C] hover on open state darkens icon; idle open state stays --plus-idle.
  ───────────────────────────────────────────────────────────────── */
  #huz-plus-btn {
    position: absolute;
    left: 3px;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 1.5px solid var(--plus-idle);
    background: #fff;
    color: var(--plus-idle);
    font-size: 19px;           /* [1D] was 16px — larger symbol, same button size */
    font-weight: 300;          /* lighter weight so enlarged size stays visually balanced */
    line-height: 1;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.12s ease,
                color 0.15s ease,
                transform 0.2s ease;
    z-index: 20;
    user-select: none;
    transform: rotate(0deg);
  }
  #huz-plus-btn.visible {
    opacity: 1;
    pointer-events: all;
  }

  /* [1A] Hover when closed: border unchanged, icon darkens */
  #huz-plus-btn:hover:not(.open) {
    border-color: var(--plus-idle);
    color: #1a1a18;
  }

  /* [1C] Open (idle): border and icon both unchanged from default */
  #huz-plus-btn.open {
    border-color: var(--plus-idle);
    color: var(--plus-idle);
    transform: rotate(45deg);   /* + → × */
  }

  /* [1B] Open + hovered: icon darkens, border still unchanged */
  #huz-plus-btn.open:hover {
    border-color: var(--plus-idle);
    color: #1a1a18;
  }

  /* ─────────────────────────────────────────────────────────────────
     Block menu: transparent wrapper, no bg/border/shadow.
     [CHANGE 2] left pushed from 32px → 38px (+6px gap between btn and menu).
     [CHANGE 6] Replaced scaleX animation with staggered fade+slide reveal.
  ───────────────────────────────────────────────────────────────── */
  #huz-block-menu {
    position: absolute;
    left: 38px;                /* [2] was 32px — 6px more gap from plus button */
    top: 0;
    display: flex;
    flex-direction: row;
    align-items: center;
    gap: 4px;
    padding: 0;
    background: transparent;
    border: none;
    border-radius: 0;
    box-shadow: none;
    z-index: 100;
    white-space: nowrap;
    /* [6] Closed state: hidden via visibility, opacity fades out */
    visibility: hidden;
    opacity: 0;
    transform: translateY(-50%);   /* vertical centering — static, not animated */
    transform-origin: left center;
    transition: opacity 0.18s ease,
                visibility 0s linear 0.18s;
    pointer-events: none;
  }
  #huz-block-menu.open {
    visibility: visible;
    opacity: 1;
    pointer-events: all;
    transition: opacity 0.18s ease,
                visibility 0s linear 0s;
  }

  /* ─────────────────────────────────────────────────────────────────
     [CHANGE 6] Staggered reveal: each child animates in from left
     Closed → children shifted left and invisible.
     Open   → children slide to natural position and fade in.
     nth-child delays create the left→right stagger.
  ───────────────────────────────────────────────────────────────── */
  #huz-block-menu > * {
    opacity: 0;
    transform: translateX(-6px);
    transition: opacity 0.18s ease, transform 0.18s ease;
  }
  #huz-block-menu.open > *:nth-child(1)  { opacity: 1; transform: translateX(0); transition-delay: 0ms;   }
  #huz-block-menu.open > *:nth-child(2)  { opacity: 1; transform: translateX(0); transition-delay: 22ms;  }
  #huz-block-menu.open > *:nth-child(3)  { opacity: 1; transform: translateX(0); transition-delay: 44ms;  }
  #huz-block-menu.open > *:nth-child(4)  { opacity: 1; transform: translateX(0); transition-delay: 56ms;  }
  #huz-block-menu.open > *:nth-child(5)  { opacity: 1; transform: translateX(0); transition-delay: 68ms;  }
  #huz-block-menu.open > *:nth-child(6)  { opacity: 1; transform: translateX(0); transition-delay: 80ms;  }
  #huz-block-menu.open > *:nth-child(7)  { opacity: 1; transform: translateX(0); transition-delay: 92ms;  }
  #huz-block-menu.open > *:nth-child(8)  { opacity: 1; transform: translateX(0); transition-delay: 104ms; }
  #huz-block-menu.open > *:nth-child(9)  { opacity: 1; transform: translateX(0); transition-delay: 116ms; }
  #huz-block-menu.open > *:nth-child(10) { opacity: 1; transform: translateX(0); transition-delay: 128ms; }
  #huz-block-menu.open > *:nth-child(11) { opacity: 1; transform: translateX(0); transition-delay: 140ms; }
  #huz-block-menu.open > *:nth-child(12) { opacity: 1; transform: translateX(0); transition-delay: 152ms; }

  /* Thin vertical separator */
  .huz-menu-sep {
    width: 1px;
    height: 18px;
    background: var(--border);
    margin: 0 2px;
    flex-shrink: 0;
    opacity: 0.6;
  }

  /* ─────────────────────────────────────────────────────────────────
     Menu buttons: individual chips, pill shape, white bg.
     [CHANGE 4] Added padding-bottom: 1px for optical vertical centering.
     line-height: 1 prevents font descenders pushing icon low.
  ───────────────────────────────────────────────────────────────── */
  .huz-menu-btn {
    position: relative;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 30px;
    height: 28px;
    border: 1px solid #E5E7EB;
    border-radius: 999px;
    background: #ffffff;
    cursor: pointer;
    font-size: 11px;
    font-weight: 700;
    font-family: var(--font-body);
    line-height: 1;              /* [4] prevents line-height pushing icons down */
    color: var(--text-muted);
    transition: color var(--t);
    user-select: none;
    flex-shrink: 0;
    /* [4] slight upward nudge compensates for DM Sans cap-height offset */
    padding-bottom: 1px;
  }

  .huz-menu-btn:hover {
    background: #ffffff;
    color: #1a1a18;
    border-color: #E5E7EB;
  }

  .huz-menu-btn.active {
    background: #ffffff;
    color: #2563EB;
    border-color: #E5E7EB;
  }

  /* Tooltip label — appears BELOW button */
  .huz-menu-btn::after {
    content: attr(data-tip);
    position: absolute;
    top: calc(100% + 7px);
    left: 50%;
    transform: translateX(-50%) translateY(-4px);
    background: var(--tooltip-bg);
    color: #fff;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.01em;
    white-space: nowrap;
    padding: 3px 7px;
    border-radius: 5px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.14s ease, transform 0.14s ease;
    z-index: 200;
  }
  /* Arrow — points UP */
  .huz-menu-btn::before {
    content: '';
    position: absolute;
    top: calc(100% + 2px);
    left: 50%;
    transform: translateX(-50%) translateY(-4px);
    border: 4px solid transparent;
    border-bottom-color: var(--tooltip-bg);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.14s ease, transform 0.14s ease;
    z-index: 200;
  }
  .huz-menu-btn:hover::after,
  .huz-menu-btn:hover::before {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* [CHANGE 5] List icon SVGs — inline, sized to fit chip */
  .huz-menu-btn svg {
    width: 14px;
    height: 14px;
    display: block;
    flex-shrink: 0;
  }

  #huz-editor {
    flex: 1;
    outline: none;
    padding: 16px 16px 16px 10px;
    font-size: 15px;
    line-height: 1.75;
    color: var(--text);
    font-family: var(--font-body);
    word-break: break-word;
    min-height: 180px;
    caret-color: #1a1a18;
    cursor: text;
    color-scheme: light;
  }
  #huz-editor:empty::before {
    content: attr(data-placeholder);
    color: var(--text-muted);
    pointer-events: none;
    user-select: none;
  }

  /* ── Block styles ── */
  #huz-editor h1 { font-size: 1.75em; font-weight: 700; line-height: 1.2; margin: 8px 0 4px; }
  #huz-editor h2 { font-size: 1.3em;  font-weight: 600; line-height: 1.3; margin: 6px 0 3px; }
  #huz-editor h3 { font-size: 1.1em;  font-weight: 600; line-height: 1.4; margin: 4px 0 2px; }
  #huz-editor ul, #huz-editor ol { padding-left: 1.5em; margin: 2px 0; }
  #huz-editor li { margin: 2px 0; }
  #huz-editor blockquote {
    border-left: 3px solid var(--accent);
    padding-left: 12px;
    color: var(--text-muted);
    font-style: italic;
    margin: 4px 0;
  }
  #huz-editor code {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1px 5px;
    font-family: var(--font-mono);
    font-size: 0.87em;
  }
  #huz-editor pre {
    background: #1e1e2e;
    color: #cdd6f4;
    border-radius: var(--radius);
    padding: 12px 15px;
    font-family: var(--font-mono);
    font-size: 0.84em;
    overflow-x: auto;
    margin: 6px 0;
    white-space: pre;
  }
  #huz-editor hr { border: none; border-top: 1.5px solid var(--border); margin: 10px 0; }
  #huz-editor p  { margin: 0; }
  #huz-editor b, #huz-editor strong { font-weight: 600; }
  #huz-editor em { font-style: italic; }
  #huz-editor u  { text-decoration: underline; }
  #huz-editor s  { text-decoration: line-through; color: var(--text-muted); }
</style>

<div class="huz-wrap" id="huz-wrap" style="cursor:text;color-scheme:light;">

      <!-- + / × toggle -->
      <button id="huz-plus-btn" aria-label="Insert block" aria-expanded="false">+</button>

      <div id="huz-block-menu" role="toolbar" aria-label="Block & format options">

    <!-- Main editable area -->

      id="huz-editor"

<!-- ─── JAVASCRIPT ─────────────────────────────────────────────────────── -->
<script>
(function () {
  'use strict';

  /* ── DOM refs ─────────────────────────────────────────────────── */
  const editor    = document.getElementById('huz-editor');
  const plusBtn   = document.getElementById('huz-plus-btn');
  const blockMenu = document.getElementById('huz-block-menu');

  /* ── State ────────────────────────────────────────────────────── */
  let activeBlock = null;
  let menuOpen    = false;
  let savedRange  = null;
  let saveTimer   = null;

  /* ══════════════════════════════════════════════════════════════
     INIT — hydrate editor from data-initial-content attribute
  ══════════════════════════════════════════════════════════════ */
  function init () {
    const raw = editor.getAttribute('data-initial-content') || '';
    if (raw && raw !== '#BUBBLE_DYNAMIC_DATA#' && raw.trim() !== '') {
      editor.innerHTML = raw;
    }
  }

  /* ══════════════════════════════════════════════════════════════
     BUBBLE SYNC
  ══════════════════════════════════════════════════════════════ */
  function syncToBubble () {
    clearTimeout(saveTimer);
    saveTimer = setTimeout(function () {
      if (typeof bubble_fn_saveEditorData === 'function') {
        bubble_fn_saveEditorData(editor.innerHTML);
      }
    }, 500);
  }

  function syncNow () {
    clearTimeout(saveTimer);
    if (typeof bubble_fn_saveEditorData === 'function') {
      bubble_fn_saveEditorData(editor.innerHTML);
    }
  }

  /* ══════════════════════════════════════════════════════════════
     GET ACTIVE BLOCK
  ══════════════════════════════════════════════════════════════ */
  function getActiveBlock () {
    const sel = window.getSelection();
    if (!sel || sel.rangeCount === 0) return null;
    let node = sel.anchorNode;
    while (node && node.parentNode !== editor) node = node.parentNode;
    return (node && node !== editor) ? node : null;
  }

  /* ══════════════════════════════════════════════════════════════
     POSITION PLUS BUTTON
  ══════════════════════════════════════════════════════════════ */
  function positionPlusBtn (block) {
    if (!block) {
      if (document.activeElement !== editor) {
        if (!menuOpen) plusBtn.classList.remove('visible');
      } else {
        showOnFirstLine();
      }
      return;
    }

    const edRect = editor.getBoundingClientRect();

    let targetRect = block.getBoundingClientRect();
    if (block.nodeName === 'UL' || block.nodeName === 'OL') {
      const sel = window.getSelection();
      if (sel && sel.rangeCount > 0) {
        let node = sel.anchorNode;
        while (node && node !== block) {
          if (node.nodeName === 'LI') { targetRect = node.getBoundingClientRect(); break; }
          node = node.parentNode;
        }
      }
    }

    const topOffset = targetRect.top - edRect.top + editor.scrollTop;
    const centered  = topOffset + (targetRect.height / 2) - 11;

    setButtonTop(Math.max(0, centered));
    plusBtn.classList.add('visible');
  }

  function showOnFirstLine () {
    const sel = window.getSelection();
    let top;

    if (sel && sel.rangeCount > 0) {
      const caretRect = sel.getRangeAt(0).getBoundingClientRect();
      const edRect    = editor.getBoundingClientRect();
      if (caretRect && caretRect.height > 0) {
        const offset = caretRect.top - edRect.top + editor.scrollTop;
        top = offset + (caretRect.height / 2) - 11;
      }
    }

    if (top === undefined) {
      const lineHeight = parseFloat(getComputedStyle(editor).lineHeight) || 26;
      top = 16 + (lineHeight / 2) - 11;
    }

    setButtonTop(Math.max(0, top));
    plusBtn.classList.add('visible');
  }

  function setButtonTop (px) {
    plusBtn.style.top   = px + 'px';
    blockMenu.style.top = (px + 11) + 'px';
  }

  /* ══════════════════════════════════════════════════════════════
     MENU OPEN / CLOSE
  ══════════════════════════════════════════════════════════════ */
  function openMenu () {
    const sel = window.getSelection();
    if (sel && sel.rangeCount > 0) savedRange = sel.getRangeAt(0).cloneRange();

    menuOpen = true;
    blockMenu.classList.add('open');
    plusBtn.classList.add('open');
    plusBtn.setAttribute('aria-expanded', 'true');
    updateInlineBtnStates();
  }

  function closeMenu () {
    menuOpen = false;
    blockMenu.classList.remove('open');
    plusBtn.classList.remove('open');
    plusBtn.setAttribute('aria-expanded', 'false');
  }

  plusBtn.addEventListener('mousedown', function (e) {
    e.preventDefault();
    e.stopPropagation();
    menuOpen ? closeMenu() : openMenu();
  });

  document.addEventListener('click', function (e) {
    if (menuOpen && !blockMenu.contains(e.target) && e.target !== plusBtn) {
      closeMenu();
    }
  });

  /* ══════════════════════════════════════════════════════════════
     BLOCK MENU — mousedown handler for all buttons
  ══════════════════════════════════════════════════════════════ */
  blockMenu.addEventListener('mousedown', function (e) {
    e.preventDefault();

    const btn      = e.target.closest('.huz-menu-btn');
    const clearBtn = e.target.closest('#huz-clear-fmt');

    if (!btn) return;

    if (clearBtn) {
      editor.focus(); restoreRange();
      document.execCommand('removeFormat', false, null);
      closeMenu();
      return;
    }

    const blockType = btn.getAttribute('data-block');
    const cmd       = btn.getAttribute('data-cmd');

    if (blockType) {
      insertOrConvertBlock(blockType);
      closeMenu();
      return;
    }

    if (cmd) {
      editor.focus(); restoreRange();
      document.execCommand(cmd, false, null);
      updateInlineBtnStates();
      syncToBubble();
    }
  });

  /* ══════════════════════════════════════════════════════════════
     INSERT / CONVERT BLOCK
  ══════════════════════════════════════════════════════════════ */
  function insertOrConvertBlock (type) {
    editor.focus();
    restoreRange();

    const cur = getActiveBlock();

    if (type === 'hr') {
      const hr = document.createElement('hr');
      const p  = document.createElement('p'); p.innerHTML = '<br>';
      insertAfter(hr, cur);
      hr.parentNode.insertBefore(p, hr.nextSibling);
      placeCursorIn(p);

    } else if (type === 'ul' || type === 'ol') {
      const list = document.createElement(type);
      const li   = document.createElement('li');
      li.innerHTML = (cur ? cur.innerHTML : null) || '<br>';
      list.appendChild(li);
      if (cur && cur.parentNode === editor) {
        editor.replaceChild(list, cur);
      } else {
        insertAfter(list, cur);
      }
      placeCursorIn(li);

    } else {
      /* p, h1, h2, h3 */
      if (cur && cur.parentNode === editor) {
        const el = document.createElement(type);
        el.innerHTML = cur.innerHTML || '<br>';
        editor.replaceChild(el, cur);
        activeBlock = el;
        placeCursorIn(el);
        positionPlusBtn(el);
      } else {
        const el = document.createElement(type);
        el.innerHTML = '<br>';
        insertAfter(el, cur);
        placeCursorIn(el);
      }
    }

    syncToBubble();
  }

  /* ── Helpers ─────────────────────────────────────────────────── */

  function restoreRange () {
    if (!savedRange) return;
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(savedRange);
  }

  function insertAfter (node, ref) {
    if (ref && ref.parentNode === editor) {
      editor.insertBefore(node, ref.nextSibling);
    } else {
      editor.appendChild(node);
    }
  }

  function placeCursorIn (el) {
    const sel   = window.getSelection();
    const range = document.createRange();
    let target  = el;
    while (target.firstChild) target = target.firstChild;
    try {
      range.setStart(target, 0);
      range.collapse(true);
    } catch (_) {
      range.selectNodeContents(el);
      range.collapse(false);
    }
    sel.removeAllRanges();
    sel.addRange(range);
  }

  function updateInlineBtnStates () {
    ['bold','italic','underline','strikeThrough'].forEach(function (cmd) {
      const btn = blockMenu.querySelector('[data-cmd="' + cmd + '"]');
      if (btn) btn.classList.toggle('active', document.queryCommandState(cmd));
    });
  }

  /* ══════════════════════════════════════════════════════════════
     EDITOR EVENT LISTENERS
  ══════════════════════════════════════════════════════════════ */

  function onCursorMove () {
    activeBlock = getActiveBlock();
    positionPlusBtn(activeBlock);
  }

  editor.addEventListener('keyup',   onCursorMove);
  editor.addEventListener('mouseup', onCursorMove);

  editor.addEventListener('focus', function () {
    setTimeout(function () {
      activeBlock = getActiveBlock();
      positionPlusBtn(activeBlock);
    }, 0);
  });

  editor.addEventListener('click', function () {
    setTimeout(function () {
      activeBlock = getActiveBlock();
      positionPlusBtn(activeBlock);
    }, 0);
  });

  editor.addEventListener('input', function () {
    activeBlock = getActiveBlock();
    positionPlusBtn(activeBlock);
    syncToBubble();
  });

  editor.addEventListener('blur', function (e) {
    if (blockMenu.contains(e.relatedTarget) || e.relatedTarget === plusBtn) return;
    plusBtn.classList.remove('visible');
    closeMenu();
    syncNow();
  });

  /* ── Keyboard shortcuts ──────────────────────────────────────── */
  editor.addEventListener('keydown', function (e) {

    if (e.key === 'Tab') {
      e.preventDefault();
      document.execCommand(e.shiftKey ? 'outdent' : 'indent', false, null);
      return;
    }

    if (e.key === 'Escape') { closeMenu(); return; }

    if (e.key === 'Enter') {
      const block = getActiveBlock();
      if (block && /^H[1-3]$/.test(block.nodeName)) {
        e.preventDefault();
        const p = document.createElement('p');
        p.innerHTML = '<br>';
        editor.insertBefore(p, block.nextSibling);
        placeCursorIn(p);
        syncToBubble();
      }
    }

  });

  /* ══════════════════════════════════════════════════════════════
     BOOT
  ══════════════════════════════════════════════════════════════ */
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }

})();
</script>
