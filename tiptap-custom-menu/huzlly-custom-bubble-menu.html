  // -------------------------------------------------------------------
  // HELPERS
  // -------------------------------------------------------------------
  // NOTE: getActiveTableElement() and getTableCellRange() used to live here —
  // they backed a "Select Entire Table" feature (via setCellSelection) that
  // was removed by product decision (see the comment above deleteTableIconBtn
  // below). Neither was called anywhere else, so they were deleted rather
  // than kept as unused dead code. If "select whole table" ever comes back,
  // the approach was: walk $from up to the enclosing `table` node, find the
  // doc positions of its first and last tableCell/tableHeader descendants via
  // `.descendants()`, then call `editor.commands.setCellSelection({ anchorCell, headCell })`.
  function closeActiveDropdown() {
    if (activeDropdown) {
      activeDropdown.classList.remove('open');
      var triggerBtn = activeDropdown.parentElement && activeDropdown.parentElement.querySelector('.huzlly-group-btn');
      if (triggerBtn) triggerBtn.classList.remove('open');
      activeDropdown = null;
    }
  }

  // Small chevron SVG for group buttons.
  function chevronSvg() {
    return '<svg class="huzlly-chevron" viewBox="0 0 256 256" width="10" height="10" fill="currentColor">' +
      '<path d="M213.66,101.66l-80,80a8,8,0,0,1-11.32,0l-80-80A8,8,0,0,1,53.66,90.34L128,164.69l74.34-74.35a8,8,0,0,1,11.32,11.32Z"/>' +
      '</svg>';
  }

  // -------------------------------------------------------------------
  // DROPDOWN GROUP BUILDER
  // makeGroup(label, iconKey, items) → a wrapper div containing:
  //   - a trigger button (label + icon + chevron)
  //   - a dropdown panel with item rows
  //
  // Each item: { iconKey, label, onClick }
  //            OR { separator: true }
  //            OR { iconKey, label, onClick, isToggle: true, getActive: fn }
  // -------------------------------------------------------------------
  function makeGroup(label, iconKey, items) {
    var wrapper = document.createElement('div');
    wrapper.style.cssText = 'position:relative;display:flex;align-items:center;';

    // Trigger button
    var trigger = document.createElement('button');
    trigger.type = 'button';
    trigger.className = 'huzlly-group-btn';
    trigger.innerHTML = iconSvg(ICONS[iconKey]) + '<span>' + label + '</span>' + chevronSvg();

    // Dropdown panel
    var panel = document.createElement('div');
    panel.className = 'huzlly-dropdown';

    items.forEach(function (item) {
      if (item.separator) {
        var sep = document.createElement('div');
        sep.className = 'huzlly-dropdown-separator';
        panel.appendChild(sep);
        return;
      }

      if (item.heading) {
        var hdg = document.createElement('div');
        hdg.style.cssText = 'padding:4px 10px 2px;font-size:10px;font-weight:600;color:#888;' +
          'text-transform:uppercase;letter-spacing:0.06em;font-family:DM Sans,Helvetica,Arial,sans-serif;';
        hdg.textContent = item.heading;
        panel.appendChild(hdg);
        return;
      }

      var row = document.createElement('button');
      row.type = 'button';
      row.className = 'huzlly-dropdown-item';
      row.innerHTML = '<span>' + item.label + '</span>';

      // For toggle items (currently: align toggles) reflect active state on open.
      // getActive is stashed directly on the row (not just documented) so
      // syncDropdownToggleStates can call the SAME function the item defines,
      // instead of a second hand-rolled copy of the same check living in two
      // places and silently drifting apart.
      if (item.isToggle) {
        row.dataset.toggleItem = 'true';
        row.dataset.toggleKey = item.label; // used by syncDropdownToggleStates
        row.__getActive = item.getActive;   // function reference, not serializable to dataset
      }

      row.addEventListener('mousedown', function (e) {
        e.preventDefault();
        e.stopPropagation();
        if (!tableActiveEditor) return;
        item.onClick(tableActiveEditor, row);
        // Refresh toggle item visuals without closing the dropdown,
        // so user can see state change and toggle again if needed.
        if (item.isToggle) {
          syncDropdownToggleStates(panel);
        } else {
          closeActiveDropdown();
        }
        var ed = tableActiveEditor;
        setTimeout(function () { checkTableContext(ed); }, 0);
      });

      panel.appendChild(row);
    });

    // Toggle dropdown open/close on trigger click
    trigger.addEventListener('mousedown', function (e) {
      e.preventDefault();
      e.stopPropagation();
      var isOpen = panel.classList.contains('open');
      closeActiveDropdown();
      if (!isOpen) {
        // Flip upward if toolbar is near top of viewport
        var toolbarRect = tableToolbar.getBoundingClientRect();
        if (toolbarRect.top < 120) {
          panel.classList.add('flip');
        } else {
          panel.classList.remove('flip');
        }
        panel.classList.add('open');
        trigger.classList.add('open');
        activeDropdown = panel;
        syncDropdownToggleStates(panel);
      }
    });

    wrapper.appendChild(trigger);
    wrapper.appendChild(panel);
    return wrapper;
  }

  // Refresh active/inactive visual state for all toggle rows in a panel.
  // Called when a panel opens and after each toggle action.
  function syncDropdownToggleStates(panel) {
    if (!tableActiveEditor) return;
    var rows = panel.querySelectorAll('[data-toggle-item]');
    rows.forEach(function (row) {
      if (typeof row.__getActive === 'function') {
        row.classList.toggle('active', !!row.__getActive(tableActiveEditor));
      }
    });
  }

  // -------------------------------------------------------------------
  // BUILD THE 5 DROPDOWN GROUPS
  // -------------------------------------------------------------------

  // 1. ROWS
  var rowsGroup = makeGroup('Rows', 'rowsPlusBottom', [
    { iconKey: 'rowsPlusTop',    label: 'Add Row Above', onClick: function (ed) { ed.chain().focus().addRowBefore().run(); } },
    { iconKey: 'rowsPlusBottom', label: 'Add Row Below', onClick: function (ed) { ed.chain().focus().addRowAfter().run(); } },
    { separator: true },
    { iconKey: 'trashSimple',    label: 'Delete Row',    onClick: function (ed) { ed.chain().focus().deleteRow().run(); } }
  ]);

  // 2. COLUMNS
  var colsGroup = makeGroup('Columns', 'columnsPlusRight', [
    { iconKey: 'columnsPlusLeft',  label: 'Add Column Left',  onClick: function (ed) { ed.chain().focus().addColumnBefore().run(); } },
    { iconKey: 'columnsPlusRight', label: 'Add Column Right', onClick: function (ed) { ed.chain().focus().addColumnAfter().run(); } },
    { separator: true },
    { iconKey: 'trashSimple',      label: 'Delete Column',    onClick: function (ed) { ed.chain().focus().deleteColumn().run(); } }
  ]);

  // 3. CELLS — merge/split + vertical align
  // Vertical align: setCellAttribute is Tiptap Tables' built-in command.
  // Works on whatever cell the cursor is in (merged or not).
  // NOTE: this modifies cell attributes through Tiptap's transaction system,
  // so it IS undo-able.
  function makeAlignItem(label, iconKey, alignValue) {
    return {
      iconKey: iconKey,
      label: label,
      isToggle: true,
      getActive: function (ed) {
        var attrs = ed.getAttributes('tableCell');
        return ((attrs && attrs.verticalAlign) || 'top') === alignValue;
      },
      onClick: function (ed, row) {
        ed.chain().focus().setCellAttribute('verticalAlign', alignValue).run();
      }
    };
  }

  var cellsGroup = makeGroup('Cells', 'squaresFour', [
    { iconKey: 'squaresFour',           label: 'Merge Cells', onClick: function (ed) { ed.chain().focus().mergeCells().run(); } },
    { iconKey: 'squareSplitHorizontal', label: 'Split Cell',  onClick: function (ed) { ed.chain().focus().splitCell().run(); } },
    { separator: true },
    { heading: 'Vertical Align' },
    makeAlignItem('Align Top',    'rowsPlusTop',    'top'),
    makeAlignItem('Align Middle', 'minus',          'middle'),
    makeAlignItem('Align Bottom', 'rowsPlusBottom', 'bottom')
  ]);

  // NOTE: previously there was a post-build pass here that patched a
  // `dataset.alignValue` onto each align row so syncDropdownToggleStates
  // could re-derive active state by string-matching. That's gone now —
  // each row carries its own `__getActive` function (set in makeGroup,
  // from `item.getActive` in makeAlignItem below), so there's exactly one
  // place that knows "is this row currently active," not two copies that
  // could drift out of sync.

  // 5. DELETE TABLE — standalone icon button directly on toolbar (no dropdown).
  // Removed the "Table" dropdown group + "Select Entire Table" option since
  // selecting the whole table had no actionable follow-up in this workflow.
  var deleteTableIconBtn = document.createElement('button');
  deleteTableIconBtn.type = 'button';
  deleteTableIconBtn.title = 'Delete Table';
  deleteTableIconBtn.innerHTML = iconSvg(ICONS['trashSimple']);
  deleteTableIconBtn.style.cssText = [
    'border:none',
    'background:transparent',
    'color:#fff',
    'width:32px',
    'height:32px',
    'border-radius:6px',
    'cursor:pointer',
    'display:flex',
    'align-items:center',
    'justify-content:center',
    'padding:0',
    'flex-shrink:0'
  ].join(';');
  deleteTableIconBtn.addEventListener('mouseenter', function () {
    deleteTableIconBtn.style.background = '#534AB7';
  });
  deleteTableIconBtn.addEventListener('mouseleave', function () {
    deleteTableIconBtn.style.background = 'transparent';
  });
  deleteTableIconBtn.addEventListener('mousedown', function (e) {
    e.preventDefault();
    e.stopPropagation();
    if (!tableActiveEditor) return;
    closeActiveDropdown();
    tableActiveEditor.chain().focus().deleteTable().run();
  });

  // -------------------------------------------------------------------
  // ASSEMBLE TOOLBAR
  // -------------------------------------------------------------------
  function makeTableSeparator() {
    var sep = document.createElement('div');
    sep.style.cssText = 'width:1px;height:20px;background:#444;margin:0 2px;flex-shrink:0;';
    return sep;
  }

  [rowsGroup, makeTableSeparator(), colsGroup, makeTableSeparator(),
   cellsGroup, makeTableSeparator(), deleteTableIconBtn
  ].forEach(function (el) { tableToolbar.appendChild(el); });

  // Same reasoning as the bubble menu above — body is always present here.
  document.body.appendChild(tableToolbar);

  // Keep dropdown open when hovering into it; cancel any pending hide.
  tableToolbar.addEventListener('mouseenter', function () {
    if (tableHideTimer) {
      clearTimeout(tableHideTimer);
      tableHideTimer = null;
    }
  });
  // mouseleave on the toolbar intentionally NOT used to hide —
  // see earlier comment; hide is driven by selectionUpdate / outside click / destroy.

  function scheduleTableHide(editor) {
    if (tableActiveEditor !== editor) return;
    if (tableHideTimer) clearTimeout(tableHideTimer);
    tableHideTimer = setTimeout(function () {
      closeActiveDropdown();
      tableToolbar.style.display = 'none';
      tableActiveEditor = null;
    }, HIDE_DELAY_MS);
  }

  function positionTableToolbar(editor) {
    try {
      var pos = editor.state.selection.$from.pos;
      var coords = editor.view.coordsAtPos(pos);

      tableToolbar.style.display = 'flex';
      var rect = tableToolbar.getBoundingClientRect();

      var finalLeft = coords.left - rect.width / 2;
      var finalTop = coords.top - rect.height - 8;

      var viewportWidth = window.innerWidth;
      if (finalLeft < 8) finalLeft = 8;
      if (finalLeft + rect.width > viewportWidth - 8) {
        finalLeft = viewportWidth - rect.width - 8;
      }
      if (finalTop < 8) {
        finalTop = coords.bottom + 8;
      }

      tableToolbar.style.top = finalTop + 'px';
      tableToolbar.style.left = finalLeft + 'px';
    } catch (err) {
      console.warn('[Huzlly Table Toolbar] positioning error', err);
    }
  }

  function showTableToolbarFor(editor) {
    if (tableHideTimer) {
      clearTimeout(tableHideTimer);
      tableHideTimer = null;
    }
    tableActiveEditor = editor;
    positionTableToolbar(editor);
  }

  // Walk up the selection's node path to see if the cursor is inside a
  // table cell/header. We try editor.isActive() first (Tiptap's own,
  // version-stable API); the manual path-walk below is a fallback in case
  // 'table' isn't registered as a direct isActive() target in some setups.
  function isCursorInsideTable(editor) {
    try {
      if (editor.isActive('tableCell') || editor.isActive('tableHeader')) {
        return true;
      }
    } catch (e) {
      // isActive can throw if the node type isn't registered; fall through
      // to the manual check below.
    }
    try {
      var sel = editor.state.selection;
      // NOTE: `$from.path` is an internal ProseMirror ResolvedPos property
      // (alternating [node, index, node, index, ...] ancestry array). It is
      // NOT part of the public PM API and could be renamed/restructured in a
      // future ProseMirror version. This fallback only runs if editor.isActive()
      // throws (e.g. node type not registered), which shouldn't happen with this
      // plugin's confirmed extension manifest. If the plugin is ever updated and
      // this breaks, replace with: walk $from.depth → $from.node(depth).type.name
      var path = sel.$from.path; // alternating [node, index, node, index, ...]
      for (var i = 0; i < path.length; i++) {
        var node = path[i];
        if (node && node.type && (node.type.name === 'tableCell' || node.type.name === 'tableHeader')) {
          return true;
        }
      }
    } catch (e) {
      console.warn('[Huzlly Table Toolbar] table-detection error', e);
    }
    return false;
  }

  function checkTableContext(editor) {
    // NOTE: deliberately NOT checking editor.isFocused here. Bubble's
    // environment unreliably reports isFocused: false at the exact moment
    // selectionUpdate fires (documented in section 7 / the floating-menu fix) —
    // it's especially noticeable right after interacting with the dropdown's
    // buttons. The selectionUpdate event firing at all is sufficient proof the
    // editor is the one being interacted with; relying on isFocused here was
    // causing the Table Toolbar (and any open dropdown) to force-hide instead
    // of repositioning whenever a different cell was clicked.
    if (!editor) {
      scheduleTableHide(editor);
      return;
    }
    // Priority rule: if the user has an active TEXT selection (not just a
    // collapsed cursor), the Bubble Menu takes priority over the Table
    // Toolbar — even if that selection happens to be inside a table cell.
    // This prevents the two floating toolbars from overlapping when text
    // is selected inside a cell.
    //
    // Exception: a CellSelection (multi-cell drag, or the "Select Entire
    // Table" button) is also "non-empty" but is a structural table
    // selection, not text — for this case the Table Toolbar IS what should
    // show (e.g. to merge the selected cells), so we don't apply the
    // text-selection priority rule here.
    if (!editor.state.selection.empty && !isCellSelection(editor)) {
      scheduleTableHide(editor);
      return;
    }
    if (isCursorInsideTable(editor) || isCellSelection(editor)) {
      showTableToolbarFor(editor);
    } else {
      scheduleTableHide(editor);
    }
  }

  // ---------------------------------------------------------------------
  // FLOATING TRIGGER — '+' button shown to the left of an empty paragraph.
  // Clicking it slides in a menu (same line, to the right of the button).
  // ---------------------------------------------------------------------

  // Inject floating menu animation styles
  var floatingStyleTag = document.createElement('style');
  floatingStyleTag.textContent =
    '#huzlly-plus-btn { transition: opacity 0.15s ease; }' +
    '#huzlly-floating-menu {' +
    '  transition: opacity 0.18s ease, transform 0.18s ease;' +
    '  opacity: 0; transform: translateX(-8px); pointer-events: none;' +
    '}' +
    '#huzlly-floating-menu.fm-open {' +
    '  opacity: 1; transform: translateX(0); pointer-events: auto;' +
    '}';
  document.head.appendChild(floatingStyleTag);

  // '+' trigger button
  var plusBtn = document.createElement('button');
  plusBtn.id = 'huzlly-plus-btn';
  plusBtn.type = 'button';
  plusBtn.title = 'Insert block';
  plusBtn.innerHTML = '<svg viewBox="0 0 256 256" width="16" height="16" fill="currentColor" style="display:block;pointer-events:none;"><path d="M228,128a12,12,0,0,1-12,12H140v76a12,12,0,0,1-24,0V140H40a12,12,0,0,1,0-24h76V40a12,12,0,0,1,24,0v76h76A12,12,0,0,1,228,128Z"/></svg>';
  plusBtn.style.cssText = [
    'position:fixed',
    'z-index:9998',
    'display:none',
    'width:24px',
    'height:24px',
    'border-radius:6px',
    'border:none',
    'background:#2a2a2a',
    'color:#aaa',
    'cursor:pointer',
    'align-items:center',
    'justify-content:center',
    'padding:0',
    'box-shadow:0 1px 4px rgba(0,0,0,0.3)'
  ].join(';');

  // Slide-in floating menu (appears to the right of '+' button)
  var floatingMenu = document.createElement('div');
  floatingMenu.id = 'huzlly-floating-menu';
  floatingMenu.style.cssText = [
    'position:fixed',
    'z-index:9999',
    'display:none',
    'background:#1f1f1f',
    'border-radius:8px',
    'box-shadow:0 4px 14px rgba(0,0,0,0.25)',
    'padding:4px',
    'gap:2px',
    'flex-direction:row',
    'align-items:center',
    'font-family:DM Sans, Helvetica, Arial, sans-serif'
  ].join(';');

  var floatingActiveEditor = null;
  var floatingHideTimer = null;
  var floatingMenuOpen = false;

  function makeFloatingButton(iconKey, title, onClick) {
    var btn = document.createElement('button');
    btn.type = 'button';
    btn.title = title;
    btn.innerHTML = iconSvg(ICONS[iconKey]);
    btn.style.cssText = [
      'border:none',
      'background:transparent',
      'color:#fff',
      'width:32px',
      'height:32px',
      'border-radius:6px',
      'cursor:pointer',
      'display:flex',
      'align-items:center',
      'justify-content:center',
      'padding:0'
    ].join(';');
    btn.addEventListener('mouseenter', function () { btn.style.background = '#534AB7'; });
    btn.addEventListener('mouseleave', function () { btn.style.background = 'transparent'; });
    btn.addEventListener('mousedown', function (e) {
      e.preventDefault();
      e.stopPropagation();
      if (!floatingActiveEditor) return;
      onClick(floatingActiveEditor);
      hideFloatingSystem();
    });
    return btn;
  }

  var fTableBtn   = makeFloatingButton('table',       'Insert Table',   function (ed) { ed.chain().focus().insertTable({ rows: 3, cols: 3, withHeaderRow: true }).run(); });
  var fBulletBtn  = makeFloatingButton('listBullets', 'Bullet List',    function (ed) { ed.chain().focus().toggleBulletList().run(); });
  var fOrderedBtn = makeFloatingButton('listNumbers', 'Numbered List',  function (ed) { ed.chain().focus().toggleOrderedList().run(); });
  var fHrBtn      = makeFloatingButton('minus',       'Horizontal Rule',function (ed) { ed.chain().focus().setHorizontalRule().run(); });

  // Image button in floating menu — built manually so it does NOT call
  // hideFloatingSystem() on click (the image popover needs to stay open).
  var fImageBtn = document.createElement('button');
  fImageBtn.type = 'button';
  fImageBtn.title = 'Insert Image';
  fImageBtn.innerHTML = iconSvg(ICONS['image']);
  fImageBtn.style.cssText = [
    'border:none',
    'background:transparent',
    'color:#fff',
    'width:32px',
    'height:32px',
    'border-radius:6px',
    'cursor:pointer',
    'display:flex',
    'align-items:center',
    'justify-content:center',
    'padding:0'
  ].join(';');
  fImageBtn.addEventListener('mouseenter', function () { fImageBtn.style.background = '#534AB7'; });
  fImageBtn.addEventListener('mouseleave', function () { fImageBtn.style.background = 'transparent'; });
  fImageBtn.addEventListener('mousedown', function (e) {
    e.preventDefault();
    e.stopPropagation();
    if (!floatingActiveEditor) return;
    if (imagePopoverEditor === floatingActiveEditor && imagePopover.style.display === 'flex') {
      closeImagePopover();
    } else {
      openImagePopoverFor(floatingActiveEditor, fImageBtn);
    }
    // Intentionally NOT calling hideFloatingSystem() — the popover is now open.
  });

  [fTableBtn, makeSeparator(), fBulletBtn, fOrderedBtn, makeSeparator(), fHrBtn, makeSeparator(), fImageBtn]
    .forEach(function (el) { floatingMenu.appendChild(el); });

  document.body.appendChild(plusBtn);
  document.body.appendChild(floatingMenu);

  // Hide both '+' and slide-in menu completely
  function hideFloatingSystem() {
    floatingMenuOpen = false;
    floatingMenu.classList.remove('fm-open');
    // Wait for transition to finish before display:none
    setTimeout(function () {
      if (!floatingMenuOpen) {
        floatingMenu.style.display = 'none';
      }
    }, 200);
    plusBtn.style.display = 'none';
    floatingActiveEditor = null;
    if (floatingHideTimer) { clearTimeout(floatingHideTimer); floatingHideTimer = null; }
  }

  function scheduleFloatingHide(editor) {
    if (floatingActiveEditor !== editor) return;
    if (floatingHideTimer) clearTimeout(floatingHideTimer);
    floatingHideTimer = setTimeout(function () {
      hideFloatingSystem();
    }, 300); // longer delay than bubble menu — '+' should stay stable
  }

  // Position '+' button to the left of the editor, vertically at cursor line.
  // Menu appears immediately to the right of '+'.
  function positionFloatingSystem(editor) {
    try {
      var pos = editor.state.selection.$from.pos;
      var coords = editor.view.coordsAtPos(pos);
      var editorDom = editor.view.dom;
      var editorRect = editorDom.getBoundingClientRect();

      // Vertical center: middle of the cursor line
      var lineTop = coords.top;
      var lineBottom = coords.bottom;
      var lineHeight = lineBottom - lineTop;
      var btnSize = 24;
      var btnTop = lineTop + (lineHeight - btnSize) / 2;

      // '+' sits 10px outside the editor's left edge
      var btnLeft = editorRect.left - btnSize - 10;
      // Clamp so it doesn't go off-screen left
      if (btnLeft < 4) btnLeft = 4;

      plusBtn.style.top  = btnTop + 'px';
      plusBtn.style.left = btnLeft + 'px';
      plusBtn.style.display = 'flex';

      // Position menu: same vertical center, starting right after '+'
      floatingMenu.style.display = 'flex';
      var menuRect = floatingMenu.getBoundingClientRect();
      var menuTop = lineTop + (lineHeight - menuRect.height) / 2;
      var menuLeft = btnLeft + btnSize + 6; // 6px gap between '+' and menu

      floatingMenu.style.top  = menuTop + 'px';
      floatingMenu.style.left = menuLeft + 'px';
    } catch (err) {
      console.warn('[Huzlly Floating Menu] positioning error', err);
    }
  }

  function showFloatingSystemFor(editor) {
    if (floatingHideTimer) { clearTimeout(floatingHideTimer); floatingHideTimer = null; }
    floatingActiveEditor = editor;
    // Reset menu to hidden state (for re-positioning before animating)
    floatingMenu.classList.remove('fm-open');
    floatingMenuOpen = false;
    positionFloatingSystem(editor);
  }

  // '+' click → open/close the slide-in menu
  plusBtn.addEventListener('mousedown', function (e) {
    e.preventDefault();
    e.stopPropagation();
    if (floatingMenuOpen) {
      floatingMenu.classList.remove('fm-open');
      floatingMenuOpen = false;
    } else {
      floatingMenuOpen = true;
      // Trigger CSS transition
      requestAnimationFrame(function () {
        floatingMenu.classList.add('fm-open');
      });
    }
  });

  // Keep system alive when hovering '+' or menu
  plusBtn.addEventListener('mouseenter', function () {
    if (floatingHideTimer) { clearTimeout(floatingHideTimer); floatingHideTimer = null; }
  });
  floatingMenu.addEventListener('mouseenter', function () {
    if (floatingHideTimer) { clearTimeout(floatingHideTimer); floatingHideTimer = null; }
  });
  // NOTE: no mouseleave hide — the '+' and menu stay visible as long as
  // the cursor is on the empty paragraph. Hide is driven only by
  // selectionUpdate (cursor moved to a different line), outside click,
  // or editor destroy.

  // Check whether the cursor is on an empty paragraph (not inside a table).
  function isOnEmptyParagraph(editor) {
    try {
      var sel = editor.state.selection;
      if (!sel.empty) return false;
      var node = sel.$from.parent;
      if (!node || node.type.name !== 'paragraph') return false;
      if (node.content.size !== 0) return false;
      if (editor.isActive('tableCell') || editor.isActive('tableHeader')) return false;
      return true;
    } catch (err) {
      return false;
    }
  }

  function checkFloatingMenuContext(editor) {
    if (!editor) {
      scheduleFloatingHide(editor);
      return;
    }
    if (isOnEmptyParagraph(editor)) {
      showFloatingSystemFor(editor);
    } else {
      scheduleFloatingHide(editor);
    }
  }

  // ---------------------------------------------------------------------
  // STARTUP: poll + observe for newly-rendered RG rows
  // ---------------------------------------------------------------------
  setInterval(scanForEditors, POLL_MS);

  var domObserver = new MutationObserver(function () {
    scanForEditors();
  });
  domObserver.observe(document.body, { childList: true, subtree: true });

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', scanForEditors);
  } else {
    scanForEditors();
  }

  // Manual trigger, useful for debugging in console
  window.__huzllyScanEditors = scanForEditors;
})();
</script>
