<script>
(function () {
  // ---------------------------------------------------------------------
  // CONFIG
  // ---------------------------------------------------------------------
  var POLL_MS = 300;          // how often we re-scan for new editor instances
  var HIDE_DELAY_MS = 120;    // small delay before hiding, avoids flicker
                               // when moving mouse from text to the menu

  // ---------------------------------------------------------------------
  // STATE
  // ---------------------------------------------------------------------
  var boundEditors = new WeakSet(); // editors we've already attached listeners to
  var activeEditor = null;          // the editor currently showing the menu
  var hideTimer = null;
  var isMouseDown = false;          // true while a drag-select is in progress

  document.addEventListener('mousedown', function () {
    isMouseDown = true;
  }, true);

  // ProseMirror Tables represents a multi-cell drag-selection as a
  // CellSelection (not a plain TextSelection). selection.empty is FALSE for
  // a CellSelection too, so checking `!selection.empty` alone can't tell a
  // genuine text selection apart from a cell-range selection.
  //
  // NOTE: this plugin's Tiptap bundle is minified, so `selection.constructor
  // .name` is mangled to a single letter (confirmed via console: returns
  // 't' for the selection object regardless of its actual type) — name-
  // based detection does NOT work here. Instead we duck-type: only
  // CellSelection instances expose a `$anchorCell` resolved position
  // (confirmed via console: present and populated during an actual cell
  // drag-selection, undefined for plain text selections).
  function isCellSelection(editor) {
    var sel = editor.state.selection;
    return !!(sel && sel.$anchorCell);
  }

  // ---------------------------------------------------------------------
  // ---------------------------------------------------------------------
  // LINK INPUT POPOVER — replaces window.prompt() (line was: var url =
  // window.prompt('Enter URL', ...)). A native browser dialog can't be
  // styled, looks jarring next to this otherwise fully custom dark/purple
  // toolbar, and some embedded/iframe contexts suppress window.prompt
  // entirely. This is a small floating panel, same visual language as
  // .huzlly-dropdown, anchored under the Link button.
  // ---------------------------------------------------------------------
  var linkPopover = document.createElement('div');
  linkPopover.id = 'huzlly-link-popover';
  linkPopover.style.cssText = [
    'position:fixed',
    'z-index:10001',
    'display:none',
    'background:#1f1f1f',
    'border-radius:8px',
    'box-shadow:0 6px 20px rgba(0,0,0,0.35)',
    'padding:6px',
    'gap:6px',
    'flex-direction:row',
    'align-items:center',
    'font-family:DM Sans, Helvetica, Arial, sans-serif'
  ].join(';');

  var linkInput = document.createElement('input');
  linkInput.type = 'text';
  linkInput.placeholder = 'https://...';
  linkInput.style.cssText = [
    'width:200px',
    'height:28px',
    'border:1px solid #444',
    'border-radius:6px',
    'background:#2a2a2a',
    'color:#fff',
    'font-family:DM Sans, Helvetica, Arial, sans-serif',
    'font-size:13px',
    'padding:0 8px',
    'outline:none'
  ].join(';');
  linkInput.addEventListener('focus', function () {
    linkInput.style.borderColor = '#7F77DD';
  });
  linkInput.addEventListener('blur', function () {
    linkInput.style.borderColor = '#444';
  });

  function makeLinkPopoverButton(label, bg) {
    var b = document.createElement('button');
    b.type = 'button';
    b.textContent = label;
    b.style.cssText = [
      'border:none',
      'background:' + bg,
      'color:#fff',
      'height:28px',
      'padding:0 10px',
      'border-radius:6px',
      'cursor:pointer',
      'font-family:DM Sans, Helvetica, Arial, sans-serif',
      'font-size:13px',
      'font-weight:500',
      'white-space:nowrap'
    ].join(';');
    return b;
  }
  var linkApplyBtn = makeLinkPopoverButton('Apply', '#534AB7');
  var linkRemoveBtn = makeLinkPopoverButton('Remove', 'transparent');
  linkApplyBtn.addEventListener('mouseenter', function () { linkApplyBtn.style.background = '#7F77DD'; });
  linkApplyBtn.addEventListener('mouseleave', function () { linkApplyBtn.style.background = '#534AB7'; });
  linkRemoveBtn.addEventListener('mouseenter', function () { linkRemoveBtn.style.background = '#3a3a3a'; });
  linkRemoveBtn.addEventListener('mouseleave', function () { linkRemoveBtn.style.background = 'transparent'; });

  [linkInput, linkApplyBtn, linkRemoveBtn].forEach(function (el) { linkPopover.appendChild(el); });
  document.body.appendChild(linkPopover);

  var linkPopoverEditor = null; // which editor the popover is currently editing a link for

  function closeLinkPopover() {
    linkPopover.style.display = 'none';
    linkPopoverEditor = null;
  }

  function applyLinkFromPopover() {
    if (!linkPopoverEditor) return;
    var url = linkInput.value.trim();
    if (url === '') {
      linkPopoverEditor.chain().focus().extendMarkRange('link').unsetLink().run();
    } else {
      linkPopoverEditor.chain().focus().extendMarkRange('link').setLink({ href: url }).run();
    }
    closeLinkPopover();
    updateButtonStates();
  }

  linkApplyBtn.addEventListener('mousedown', function (e) {
    e.preventDefault();
    e.stopPropagation();
    applyLinkFromPopover();
  });
  linkRemoveBtn.addEventListener('mousedown', function (e) {
    e.preventDefault();
    e.stopPropagation();
    if (!linkPopoverEditor) return;
    linkPopoverEditor.chain().focus().extendMarkRange('link').unsetLink().run();
    closeLinkPopover();
    updateButtonStates();
  });
  linkInput.addEventListener('keydown', function (e) {
    e.stopPropagation(); // don't let the editor or other shortcuts swallow this
    if (e.key === 'Enter') {
      e.preventDefault();
      applyLinkFromPopover();
    } else if (e.key === 'Escape') {
      e.preventDefault();
      closeLinkPopover();
    }
  });
  // Mousedown on the popover itself (e.g. clicking blank padding) shouldn't
  // count as an "outside click" and shouldn't steal focus from the input —
  // same preventDefault pattern used by every other toolbar button here.
  linkPopover.addEventListener('mousedown', function (e) {
    if (e.target !== linkInput) e.preventDefault();
  });

  function openLinkPopoverFor(editor, anchorBtn) {
    linkPopoverEditor = editor;
    var existing = editor.getAttributes('link').href;
    linkInput.value = existing || '';
    linkPopover.style.display = 'flex';

    var btnRect = anchorBtn.getBoundingClientRect();
    var popRect = linkPopover.getBoundingClientRect(); // safe even at display:none->flex same tick, measured after display set above
    var left = btnRect.left;
    var top = btnRect.bottom + 8;

    var viewportWidth = window.innerWidth;
    if (left + popRect.width > viewportWidth - 8) left = viewportWidth - popRect.width - 8;
    if (left < 8) left = 8;

    linkPopover.style.left = left + 'px';
    linkPopover.style.top = top + 'px';

    // Focus + select existing text so typing a new URL replaces it immediately
    setTimeout(function () {
      linkInput.focus();
      linkInput.select();
    }, 0);
  }

  // Closing the link popover on outside click reuses the same document-level
  // capture-phase click listener as the rest of the toolbars (added below).

  // ---------------------------------------------------------------------
  // IMAGE INSERT POPOVER
  // Replaces any file-dialog approach with a styled inline panel —
  // same visual language as the link popover and the rest of the toolbars.
  // Supports two paths: paste/type a URL, OR pick a local file.
  // ---------------------------------------------------------------------
  var imagePopover = document.createElement('div');
  imagePopover.id = 'huzlly-image-popover';
  imagePopover.style.cssText = [
    'position:fixed',
    'z-index:10001',
    'display:none',
    'background:#1f1f1f',
    'border-radius:8px',
    'box-shadow:0 6px 20px rgba(0,0,0,0.35)',
    'padding:10px',
    'gap:8px',
    'flex-direction:column',
    'font-family:DM Sans, Helvetica, Arial, sans-serif',
    'width:260px'
  ].join(';');

  // URL row
  var imageUrlInput = document.createElement('input');
  imageUrlInput.type = 'text';
  imageUrlInput.placeholder = 'Paste image URL…';
  imageUrlInput.style.cssText = [
    'width:100%',
    'height:28px',
    'border:1px solid #444',
    'border-radius:6px',
    'background:#2a2a2a',
    'color:#fff',
    'font-family:DM Sans, Helvetica, Arial, sans-serif',
    'font-size:13px',
    'padding:0 8px',
    'outline:none',
    'box-sizing:border-box'
  ].join(';');
  imageUrlInput.addEventListener('focus', function () { imageUrlInput.style.borderColor = '#7F77DD'; });
  imageUrlInput.addEventListener('blur',  function () { imageUrlInput.style.borderColor = '#444'; });

  // Divider row with "or" label
  var imageOrRow = document.createElement('div');
  imageOrRow.style.cssText = 'display:flex;align-items:center;gap:8px;';
  var imageOrLine1 = document.createElement('div');
  imageOrLine1.style.cssText = 'flex:1;height:1px;background:#333;';
  var imageOrLabel = document.createElement('span');
  imageOrLabel.textContent = 'or';
  imageOrLabel.style.cssText = 'font-size:11px;color:#666;font-family:DM Sans,Helvetica,Arial,sans-serif;white-space:nowrap;';
  var imageOrLine2 = document.createElement('div');
  imageOrLine2.style.cssText = 'flex:1;height:1px;background:#333;';
  [imageOrLine1, imageOrLabel, imageOrLine2].forEach(function (el) { imageOrRow.appendChild(el); });

  // File pick button
  var imageFileInput = document.createElement('input');
  imageFileInput.type = 'file';
  imageFileInput.accept = 'image/*';
  imageFileInput.style.cssText = 'display:none;';
  var imageFileBtn = document.createElement('button');
  imageFileBtn.type = 'button';
  imageFileBtn.textContent = 'Choose from device';
  imageFileBtn.style.cssText = [
    'width:100%',
    'height:28px',
    'border:1px solid #444',
    'border-radius:6px',
    'background:transparent',
    'color:#aaa',
    'font-family:DM Sans, Helvetica, Arial, sans-serif',
    'font-size:13px',
    'cursor:pointer',
    'white-space:nowrap'
  ].join(';');
  imageFileBtn.addEventListener('mouseenter', function () { imageFileBtn.style.borderColor = '#7F77DD'; imageFileBtn.style.color = '#fff'; });
  imageFileBtn.addEventListener('mouseleave', function () { imageFileBtn.style.borderColor = '#444';   imageFileBtn.style.color = '#aaa'; });
  imageFileBtn.addEventListener('mousedown', function (e) {
    e.preventDefault();
    e.stopPropagation();
    imageFileInput.value = '';
    imageFileInput.click();
  });
  imageFileInput.addEventListener('change', function () {
    var file = imageFileInput.files && imageFileInput.files[0];
    if (!file || !imagePopoverEditor) return;
    var reader = new FileReader();
    reader.onload = function (evt) {
      var src = evt.target.result;
      imagePopoverEditor.chain().focus().setImage({ src: src }).run();
      closeImagePopover();
    };
    reader.readAsDataURL(file);
  });

  // Action buttons row
  var imageActionRow = document.createElement('div');
  imageActionRow.style.cssText = 'display:flex;gap:6px;';

  function makeImagePopoverButton(label, bg) {
    var b = document.createElement('button');
    b.type = 'button';
    b.textContent = label;
    b.style.cssText = [
      'flex:1',
      'border:none',
      'background:' + bg,
      'color:#fff',
      'height:28px',
      'border-radius:6px',
      'cursor:pointer',
      'font-family:DM Sans, Helvetica, Arial, sans-serif',
      'font-size:13px',
      'font-weight:500',
      'white-space:nowrap'
    ].join(';');
    return b;
  }
  var imageApplyBtn  = makeImagePopoverButton('Insert', '#534AB7');
  var imageCancelBtn = makeImagePopoverButton('Cancel', 'transparent');
  imageApplyBtn.addEventListener('mouseenter',  function () { imageApplyBtn.style.background  = '#7F77DD'; });
  imageApplyBtn.addEventListener('mouseleave',  function () { imageApplyBtn.style.background  = '#534AB7'; });
  imageCancelBtn.addEventListener('mouseenter', function () { imageCancelBtn.style.background = '#3a3a3a'; });
  imageCancelBtn.addEventListener('mouseleave', function () { imageCancelBtn.style.background = 'transparent'; });

  [imageApplyBtn, imageCancelBtn].forEach(function (el) { imageActionRow.appendChild(el); });

  [imageUrlInput, imageOrRow, imageFileBtn, imageFileInput, imageActionRow].forEach(function (el) {
    imagePopover.appendChild(el);
  });
  document.body.appendChild(imagePopover);

  var imagePopoverEditor = null;

  function closeImagePopover() {
    imagePopover.style.display = 'none';
    imagePopoverEditor = null;
  }

  function applyImageFromPopover() {
    if (!imagePopoverEditor) return;
    var url = imageUrlInput.value.trim();
    if (!url) return;
    imagePopoverEditor.chain().focus().setImage({ src: url }).run();
    closeImagePopover();
  }

  imageApplyBtn.addEventListener('mousedown', function (e) {
    e.preventDefault();
    e.stopPropagation();
    applyImageFromPopover();
  });
  imageCancelBtn.addEventListener('mousedown', function (e) {
    e.preventDefault();
    e.stopPropagation();
    closeImagePopover();
  });
  imageUrlInput.addEventListener('keydown', function (e) {
    e.stopPropagation();
    if (e.key === 'Enter') { e.preventDefault(); applyImageFromPopover(); }
    else if (e.key === 'Escape') { e.preventDefault(); closeImagePopover(); }
  });
  imagePopover.addEventListener('mousedown', function (e) {
    if (e.target !== imageUrlInput) e.preventDefault();
  });

  function openImagePopoverFor(editor, anchorBtn) {
    imagePopoverEditor = editor;
    imageUrlInput.value = '';
    imagePopover.style.display = 'flex';

    var btnRect = anchorBtn.getBoundingClientRect();
    var popRect = imagePopover.getBoundingClientRect();
    var left = btnRect.left;
    var top  = btnRect.bottom + 8;

    var viewportWidth = window.innerWidth;
    if (left + popRect.width > viewportWidth - 8) left = viewportWidth - popRect.width - 8;
    if (left < 8) left = 8;

    imagePopover.style.left = left + 'px';
    imagePopover.style.top  = top  + 'px';

    setTimeout(function () { imageUrlInput.focus(); }, 0);
  }

  // BUILD THE MENU DOM (once)
  // ---------------------------------------------------------------------
  var menu = document.createElement('div');
  menu.id = 'huzlly-custom-bubble-menu';
  menu.style.cssText = [
    'position:fixed',
    'top:0',
    'left:0',
    'z-index:9999',
    'display:none',
    'background:#1f1f1f',
    'border-radius:8px',
    'box-shadow:0 4px 14px rgba(0,0,0,0.25)',
    'padding:4px',
    'gap:2px',
    'flex-direction:row',
    'align-items:center',
    'font-family:DM Sans, Helvetica, Arial, sans-serif'
  ].join(';');

  // Phosphor Icons (Bold weight) — raw <path> "d" data, sourced from

  function iconSvg(pathData) {

  function makeButton(iconKey, title, onClick) {
    var btn = document.createElement('button');
    btn.type = 'button';
    btn.title = title;
    btn.innerHTML = iconSvg(ICONS[iconKey]);
    btn.style.cssText = [
      'border:none',
      'background:transparent',
      'color:#fff',
      'width:32px',
      'height:32px',
      'border-radius:6px',
      'cursor:pointer',
      'display:flex',
      'align-items:center',
      'justify-content:center',
      'padding:0'
    ].join(';');
    btn.dataset.active = 'false';
    btn.addEventListener('mouseenter', function () {
      // Use a lighter highlight if already active, so hover still gives
      // feedback without erasing the "this is currently applied" color.
      btn.style.background = btn.dataset.active === 'true' ? '#948CE0' : '#534AB7';
    });
    btn.addEventListener('mouseleave', function () {
      // Restore based on actual active state, not a hardcoded transparent —
      // otherwise hovering off an active (e.g. Bold-is-on) button would
      // incorrectly clear its "active" highlight even though the mark is
      // still applied to the selected text.
      btn.style.background = btn.dataset.active === 'true' ? '#7F77DD' : 'transparent';
    });
    // mousedown (not click) so we fire before the editor's blur/selection
    // collapses, and we preventDefault so the editor never loses focus.
    btn.addEventListener('mousedown', function (e) {
      e.preventDefault();
      e.stopPropagation();
      if (!activeEditor) return;
      onClick(activeEditor);
      updateButtonStates();
    });
    return btn;
  }

  function positionMenuForEditor(editor) {
    try {
      var selection = editor.state.selection;
      var from = selection.from;
      var to = selection.to;
      var startCoords = editor.view.coordsAtPos(from);
      var endCoords = editor.view.coordsAtPos(to);

      var top = Math.min(startCoords.top, endCoords.top);
      var left = (startCoords.left + endCoords.left) / 2;

      // Measure menu after it's visible (display:flex) so width is accurate
      menu.style.display = 'flex';
      var menuRect = menu.getBoundingClientRect();

      var finalLeft = left - menuRect.width / 2;
      var finalTop = top - menuRect.height - 8; // 8px gap above selection

      // Keep menu within viewport horizontally
      var viewportWidth = window.innerWidth;
      if (finalLeft < 8) finalLeft = 8;
      if (finalLeft + menuRect.width > viewportWidth - 8) {
        finalLeft = viewportWidth - menuRect.width - 8;
      }

      // If there isn't room above, flip below the selection
      if (finalTop < 8) {
        finalTop = Math.max(startCoords.bottom, endCoords.bottom) + 8;
      }

      menu.style.top = finalTop + 'px';
      menu.style.left = finalLeft + 'px';
    } catch (err) {
      // selection/coords can briefly be invalid during fast typing; ignore
      console.warn('[Huzlly Bubble Menu] positioning error', err);
    }
  }

  // Position the menu at raw viewport coordinates (e.g. right-click mouse pos).
  // Used instead of positionMenuForEditor when there's no meaningful selection
  // to derive coords from — the menu appears just above the click point.
  function positionMenuAtCoords(clientX, clientY) {
    try {
      menu.style.display = 'flex';
      var menuRect = menu.getBoundingClientRect();
      var viewportWidth  = window.innerWidth;
      var viewportHeight = window.innerHeight;

      var finalLeft = clientX - menuRect.width / 2;
      var finalTop  = clientY - menuRect.height - 8; // 8px gap above click

      // Clamp horizontally
      if (finalLeft < 8) finalLeft = 8;
      if (finalLeft + menuRect.width > viewportWidth - 8) {
        finalLeft = viewportWidth - menuRect.width - 8;
      }

      // If no room above, flip below click point
      if (finalTop < 8) finalTop = clientY + 8;

      // Final vertical clamp (shouldn't normally be needed)
      if (finalTop + menuRect.height > viewportHeight - 8) {
        finalTop = viewportHeight - menuRect.height - 8;
      }

      menu.style.top  = finalTop  + 'px';
      menu.style.left = finalLeft + 'px';
    } catch (err) {
      console.warn('[Huzlly Bubble Menu] positionMenuAtCoords error', err);
    }
  }

    if (hideTimer) {

      hideTimer = null;

  function showMenuForAtCoords(editor, clientX, clientY) {

      hideTimer = null;

    positionMenuAtCoords(clientX, clientY);

  // risked showing the menu for a stale non-empty selection left over in a
  // totally different, unfocused row.
  // Fix: corroborate with document.activeElement (whether the click
  // landed inside that editor's own contenteditable DOM) as a second,
  // independent signal alongside isFocused — either one being true is
  // enough, since the two are unreliable in different ways but unlikely to
  // both be wrong for the same editor at the same moment.
  document.addEventListener('mouseup', function () {
    isMouseDown = false;
    setTimeout(function () {
      var nodes = document.querySelectorAll('.ProseMirror');
      for (var i = 0; i < nodes.length; i++) {
        var ed = nodes[i].editor;
        if (!ed) continue;
        var domLooksFocused = document.activeElement === nodes[i] || nodes[i].contains(document.activeElement);
        if ((ed.isFocused || domLooksFocused) && !ed.state.selection.empty) {
          // A CellSelection (multi-cell drag) is also "non-empty", but it's
          // a structural table selection, not text — the Bubble Menu
          // (Bold/Italic/etc.) doesn't apply to it. Let checkTableContext
          // handle this case instead (Merge Cells etc. in the Table
          // Toolbar), and skip showing the text-formatting menu here.
          if (isCellSelection(ed)) {
            checkTableContext(ed);
            return;
          }
          showMenuFor(ed);
          // Priority rule: a non-empty text selection always wins over the
          // Table Toolbar, even if the selection is inside a table cell.
          // Force-clear any lingering table toolbar immediately rather
          // than waiting on its own hide-debounce, so the two floating
          // toolbars never appear stacked on top of each other.
          if (tableHideTimer) {
            clearTimeout(tableHideTimer);
            tableHideTimer = null;
          }
          tableToolbar.style.display = 'none';
          tableActiveEditor = null;
          return;
        }
      }
    }, 0);
  });

  // ---------------------------------------------------------------------
  // BINDING TO EDITOR INSTANCES
  // ---------------------------------------------------------------------
  // ---------------------------------------------------------------------
  // GOOGLE-DOCS-STYLE FIXED-WIDTH COLUMN RESIZING — PERCENTAGE / PORTABLE
  //
  // ORIGINAL PROBLEM (section 12 of the reference .md): Tiptap's Table
  // extension wraps prosemirror-tables' `columnResizing` plugin. On drag,
  // that plugin's internal `updateColumnWidth()` sets a new `colwidth`
  // attr (PIXELS) on ONLY the dragged column, on every row, via
  // `view.dispatch(tr)`. It never touches neighboring columns and has no
  // concept of "total table width" — so with `table-layout:fixed` +
  // explicit pixel `<col>` widths, the table's rendered width becomes
  // sum(colwidths), which grows/shrinks freely and can exceed the editor
  // container, causing a horizontal scrollbar.
  //
  // WHY THIS GOT REWRITTEN FROM THE ORIGINAL PIXEL VERSION: even after
  // fixing overflow-inside-Bubble by keeping sum(colwidths) constant in
  // PIXELS, those pixels are meaningless once the saved HTML is rendered
  // as PLAIN HTML on a different website at a different container width.
  // A column resized to 267px inside an 800px-wide Bubble editor is still
  // "267px" — and too narrow/too wide/overflowing — inside a 200px-wide
  // or 1600px-wide container elsewhere. Percentages are the only unit
  // that's correct in any container, so cell width is now persisted as
  // `style="width:NN.NN%"` instead of as a `colwidth` pixel attr. See
  // section 13 of the reference .md for the full write-up.
  //
  // FIX: we cannot configure this away (no such option exists on
  // Table/TableCell), and we can't `.extend()` the bundled Table extension
  // since this Tiptap build is minified/black-boxed (see section 2 of the
  // reference .md). Instead we use `editor.registerPlugin()` to attach an
  // `appendTransaction` plugin per editor instance that:
  //   1. Lets the stock columnResizing plugin's drag/cursor/handle UI run
  //      completely untouched — it still writes a `colwidth` (px) attr on
  //      the dragged column every mousemove tick; we just intercept the
  //      resulting transaction and never let that px value reach the
  //      saved doc.
  //   2. Converts that column's requested px width into a % of the
  //      table's current rendered width, then looks up the table's
  //      EXISTING proportions from each cell's own `style="width:%"` —
  //      our persisted source of truth — seeding from actual rendered
  //      pixel widths the first time a table is touched (no style widths
  //      yet either).
  //   3. Redistributes the dragged column's delta proportionally across
  //      every OTHER column, clamped at MIN_COL_PCT, so the percentages
  //      always sum to exactly 100 — the table's rendered total width can
  //      never exceed its container, in Bubble or anywhere else.
  //   4. Dispatches a follow-up transaction in the same tick that writes
  //      the corrected `style="width:%"` onto every cell AND nulls out
  //      `colwidth`, so ProseMirror's stock `<col style="width:Npx">`
  //      never renders — it would silently win over the cell's own %
  //      width under `table-layout:fixed`, and is exactly the absolute
  //      pixel value that breaks on a different site.
  // ---------------------------------------------------------------------
  (function () {
    var MIN_COL_PCT = 5; // floor per column, as a % of table width (replaces the old 40px floor)

    // Lightweight TableMap: row/col -> { cell, cellIndex, rowIndex, startCol,
    // colspan }. Standalone equivalent of prosemirror-tables' TableMap,
    // written from scratch since we can't import internals from this
    // minified bundle. (Unchanged from the pixel version.)
    function buildColumnMap(table) {
      var width = 0;
      var rows = [];
      table.forEach(function (row) { rows.push(row); });

      rows.forEach(function (row) {
        var w = 0;
        row.forEach(function (cell) { w += cell.attrs.colspan || 1; });
        if (w > width) width = w;
      });

      var map = rows.map(function () { return new Array(width).fill(null); });
      var rowspanCarry = [];

      rows.forEach(function (row, rowIndex) {
        var col = 0;
        var cellIndex = 0;
        var cells = [];
        row.forEach(function (cell) { cells.push(cell); });

        while (col < width) {
          var carried = rowspanCarry.find(function (c) { return c.col === col && c.remaining > 0; });
          if (carried) {
            map[rowIndex][col] = carried.entry;
            carried.remaining--;
            col++;
            continue;
          }
          var cell = cells[cellIndex];
          if (!cell) break;
          var colspan = cell.attrs.colspan || 1;
          var rowspan = cell.attrs.rowspan || 1;
          var entry = { cell: cell, cellIndex: cellIndex, rowIndex: rowIndex, startCol: col, colspan: colspan };
          for (var c = 0; c < colspan; c++) map[rowIndex][col + c] = entry;
          if (rowspan > 1) rowspanCarry.push({ col: col, entry: entry, remaining: rowspan - 1 });
          col += colspan;
          cellIndex++;
        }
      });

      return { width: width, height: rows.length, rows: rows, map: map };
    }

    function findEnclosingTable(state, pos) {
      var $pos = state.doc.resolve(pos);
      for (var d = $pos.depth; d > 0; d--) {
        if ($pos.node(d).type.name === 'table') {
          return { table: $pos.node(d), tableStart: $pos.before(d) };
        }
      }
      return null;
    }

    // Reads the raw `colwidth` (PIXEL) attr the STOCK columnResizing
    // plugin just wrote for whichever column is being dragged right now.
    // We never persist colwidth ourselves (applyColumnPcts below always
    // nulls it back out), so on every tick this is empty except for the
    // one column actively being dragged — that IS the "what changed"
    // signal, with zero before/after diffing needed.
    function getDraggedColumnPx(table) {
      var map = buildColumnMap(table);
      for (var col = 0; col < map.width; col++) {
        var entry = map.map[0] ? map.map[0][col] : null;
        if (!entry) continue;
        var idx = col - entry.startCol;
        var cw = entry.cell.attrs.colwidth ? entry.cell.attrs.colwidth[idx] : null;
        if (cw) return { col: col, px: cw, mapWidth: map.width };
      }
      return null;
    }

    // Pulls the `width:NN.NN%` portion out of a cell's inline `style`
    // attribute. The `style` attribute itself is kept alive across the
    // save/load round-trip by the `preserveAttributes` extension (see
    // section 2.2 of the reference .md) — this just parses our one
    // property back out of whatever else might share that string (e.g.
    // `vertical-align` from the built-in cell-alignment feature).
    function readStylePct(styleStr) {
      if (!styleStr) return null;
      var m = /width\s*:\s*([\d.]+)\s*%/i.exec(styleStr);
      return m ? parseFloat(m[1]) : null;
    }

    // Reads existing per-column percentages straight from each cell's own
    // `style="width:%"` — this is OUR persisted memory now, replacing the
    // old colwidth-array-as-memory approach, precisely so the doc never
    // has to carry colwidth (px) as state between drags.
    function getExistingColumnPcts(table) {
      var map = buildColumnMap(table);
      var pcts = new Array(map.width).fill(null);
      var hasAny = false;
      for (var col = 0; col < map.width; col++) {
        var entry = map.map[0] ? map.map[0][col] : null;
        if (!entry) continue;
        var whole = readStylePct(entry.cell.attrs.style);
        if (whole == null) continue;
        // A spanned cell's style% covers its whole span; split evenly across
        // the underlying columns for this internal map — same level of
        // approximation the old colwidth-array version used for spans.
        pcts[col] = whole / entry.colspan;
        hasAny = true;
      }
      return { pcts: pcts, hasAny: hasAny, map: map };
    }

    // Converts any array of positive relative weights into percentages
    // that sum to exactly 100, with every entry floored at MIN_COL_PCT.
    // Used both for seeding (raw px weights in) and as a final safety
    // pass on whatever redistribute() produces, since floor-clamping or
    // float rounding could otherwise drift the sum away from 100 by a
    // fraction of a percent over many drags — and that drift is exactly
    // what would let the table overflow its container.
    function normalizeToPct(weights) {
      var n = weights.length;
      var total = weights.reduce(function (s, w) { return s + w; }, 0) || 1;
      var pct = weights.map(function (w) { return Math.max(MIN_COL_PCT, (w / total) * 100); });

      var over = pct.reduce(function (s, p) { return s + p; }, 0) - 100;
      if (Math.abs(over) > 0.001) {
        var aboveFloorIdx = [];
        for (var i = 0; i < n; i++) if (pct[i] > MIN_COL_PCT + 0.001) aboveFloorIdx.push(i);
        var aboveFloorTotal = aboveFloorIdx.reduce(function (s, i) { return s + (pct[i] - MIN_COL_PCT); }, 0);
        if (aboveFloorTotal > 0) {
          aboveFloorIdx.forEach(function (i) {
            var share = (pct[i] - MIN_COL_PCT) / aboveFloorTotal;
            pct[i] -= over * share;
          });
        }
      }

      var sumSoFar = 0;
      for (var j = 0; j < n - 1; j++) {
        pct[j] = Math.round(pct[j] * 100) / 100;
        sumSoFar += pct[j];
      }
      pct[n - 1] = Math.round((100 - sumSoFar) * 100) / 100; // last column absorbs all rounding drift
      return pct;
    }

    // Read current rendered pixel widths straight off the DOM, then
    // normalise to percentages summing to exactly 100. Used only the
    // first time a given table is touched, before any style widths
    // exist, so the seeded baseline reflects whatever proportions are
    // actually on-screen right now (typically an equal split, from the
    // default table-layout:fixed behaviour on a freshly-inserted table).
    function seedColumnPcts(editor, tableStart, mapWidth) {
      var dom = editor.view.nodeDOM(tableStart);
      while (dom && dom.tagName !== 'TABLE') dom = dom.parentElement;
      var px = [];
      if (dom) {
        var firstRowEl = dom.querySelector('tr');
        var cellEls = firstRowEl ? Array.prototype.slice.call(firstRowEl.children) : [];
        var col = 0;
        cellEls.forEach(function (el) {
          var span = el.colSpan || 1;
          var perCol = el.getBoundingClientRect().width / span;
          for (var i = 0; i < span; i++) px[col + i] = perCol;
          col += span;
        });
      }
      for (var i = 0; i < mapWidth; i++) {
        if (!px[i] || isNaN(px[i])) px[i] = 1; // equal fallback weight, never 0 (avoids divide-by-zero)
      }
      return normalizeToPct(px);
    }

    // Core math: given the table's current per-column percentages, the
    // column that changed, and its requested new percentage, return a
    // corrected array where the total stays at exactly 100 — delta is
    // absorbed proportionally by every OTHER column, clamped at
    // MIN_COL_PCT (mirrors Google Docs: dragging stops absorbing once
    // neighbors hit their floor). Same algorithm as the original pixel
    // version (section 12), just in % units with a % floor.
    function redistribute(pcts, changedCol, requestedNewPct) {
      var n = pcts.length;
      var oldVal = pcts[changedCol];
      var requestedDelta = requestedNewPct - oldVal;

      var others = [];
      for (var i = 0; i < n; i++) if (i !== changedCol) others.push(i);
      var othersTotal = others.reduce(function (s, i) { return s + pcts[i]; }, 0);

      var delta = requestedDelta;
      if (delta > 0) {
        var maxAbsorbable = Math.max(othersTotal - others.length * MIN_COL_PCT, 0);
        delta = Math.min(delta, maxAbsorbable);
      } else if (delta < 0) {
        var minShrink = MIN_COL_PCT - oldVal;
        delta = Math.max(delta, minShrink);
      }

      var result = pcts.slice();
      result[changedCol] = oldVal + delta;

      if (delta !== 0 && othersTotal > 0) {
        var remaining = -delta;
        var distributed = 0;
        others.forEach(function (i, idx) {
          var share = pcts[i] / othersTotal;
          var amount = (idx === others.length - 1) ? (remaining - distributed) : (remaining * share);
          var newP = pcts[i] + amount;
          if (newP < MIN_COL_PCT) newP = MIN_COL_PCT;
          result[i] = newP;
          distributed += amount;
        });
      }
      // Safety pass: guarantees an exact 100 sum regardless of any
      // floor-clamping above (mirrors normalizeToPct's drift fix).
      return normalizeToPct(result);
    }

    // Merges a new `width:NN.NN%` into a cell's existing inline `style`
    // string, preserving any other style property already present (e.g.
    // `vertical-align`, which Tiptap's built-in cell-alignment feature
    // renders into the same merged `style` attribute) instead of
    // clobbering the whole thing.
    function withStyleWidth(styleStr, pct) {
      var props = (styleStr || '').split(';')
        .map(function (p) { return p.trim(); })
        .filter(function (p) { return p && !/^width\s*:/i.test(p); });
      props.push('width:' + pct.toFixed(2) + '%');
      return props.join('; ');
    }

    // Write a corrected percentage array back onto every row of the table
    // inside the given transaction (using the transaction's own evolving
    // doc, so positions stay valid across multiple setNodeMarkup calls).
    // `colwidth` is always nulled here — see the big comment above this
    // IIFE for why — so the only width signal that ever reaches
    // `editor.getHTML()` is each cell's own `style="width:%"`.
    function applyColumnPcts(tr, tableStart, table, pcts) {
      var map = buildColumnMap(table);

      for (var col = 0; col < map.width; col++) {
        for (var r = 0; r < map.height; r++) {
          var entry = map.map[r][col];
          if (!entry || entry.startCol !== col) continue;

          var row = table.child(r);
          var rowStart = tableStart + 1;
          for (var rr = 0; rr < r; rr++) rowStart += table.child(rr).nodeSize;

          var offsetInRow = 0, ci = 0, cellPos = null;
          row.forEach(function (c2) {
            if (ci === entry.cellIndex) cellPos = rowStart + offsetInRow;
            offsetInRow += c2.nodeSize;
            ci++;
          });
          if (cellPos == null) continue;

          var mapped = tr.mapping.map(cellPos);
          var node = tr.doc.nodeAt(mapped);
          if (!node) continue;

          var colspan = entry.colspan;
          var cellPct = 0;
          for (var c = 0; c < colspan; c++) cellPct += pcts[col + c] || 0;

          var newAttrs = Object.assign({}, node.attrs, {
            colwidth: null,
            style: withStyleWidth(node.attrs.style, cellPct)
          });
          tr.setNodeMarkup(mapped, null, newAttrs);
        }
      }
    }

    // NOTE: we deliberately do NOT inspect step.toJSON().stepType here.
    // In this minified bundle, step class names/shapes can't be relied on
    // (confirmed elsewhere in this file — see section 2.3 of the reference
    // .md re: mangled constructor names). Attr-only changes (which is all
    // the stock columnResizing plugin ever produces) NEVER change the
    // document's content size — only typing/insert/delete/paste do. So we
    // use size-equality as a bundle-agnostic proxy for "this was an
    // attribute-only transaction", then confirm it's actually a colwidth
    // change inside the per-table loop below (harmless no-op otherwise).
    function isAttrOnlyTransaction(tr) {
      if (!tr.docChanged) return false;
      return tr.before.content.size === tr.doc.content.size;
    }

    // NOTE: we deliberately do NOT try to locate the real ProseMirror
    // `Plugin` class via constructor-name sniffing. This bundle is minified
    // (constructor names get mangled — confirmed elsewhere in this file,
    // see the isCellSelection() comment in section 1 of the reference .md),
    // so `constructor.name === 'Plugin'` is unreliable and was the actual
    // cause of this plugin silently failing to install. ProseMirror's
    // EditorState only ever reads `plugin.spec.appendTransaction`,
    // `plugin.props`, and `plugin.key` off a plugin object — it does not
    // `instanceof`-check. So we hand it a plain duck-typed object instead.
    function createGoogleDocsResizePlugin(editor) {
      var pluginKey = {}; // unique identity, only used for object equality

      return {
        key: pluginKey,
        props: {},
        spec: {
          key: pluginKey,
          appendTransaction: function (transactions, oldState, newState) {
            if (!transactions.some(function (t) { return t.docChanged; })) return null;
            if (!transactions.every(isAttrOnlyTransaction)) return null;

            var fixupTr = newState.tr;
            var touchedAnyTable = false;

            newState.doc.descendants(function (node, pos) {
              if (node.type.name !== 'table') return true;

              // The dragged column + its requested PIXEL width come
              // straight off the stock plugin's own colwidth write in the
              // NEW state — we never persist colwidth ourselves, so this
              // is empty except for the one column actively being
              // dragged right now.
              var dragged = getDraggedColumnPx(node);
              if (!dragged) return true;

              // Container width = the table's actual current rendered
              // width, measured fresh on every tick. This stays stable
              // across a single drag — it's driven by the editor's own
              // CSS width (table-layout:fixed + width:100%), never by
              // anything this plugin writes — so reading it here is safe
              // even though the DOM hasn't repainted for THIS tick's
              // transaction yet.
              var dom = editor.view.nodeDOM(pos);
              while (dom && dom.tagName !== 'TABLE') dom = dom.parentElement;
              var containerPx = dom ? dom.getBoundingClientRect().width : 0;
              if (!containerPx) return true;

              var requestedPct = (dragged.px / containerPx) * 100;

              var oldFound = findEnclosingTable(oldState, Math.min(pos + 1, oldState.doc.content.size - 1));
              var oldTable = oldFound ? oldFound.table : null;
              if (!oldTable) return true;

              var oldInfo = getExistingColumnPcts(oldTable);
              if (oldInfo.pcts.length !== dragged.mapWidth) return true;

              var baseline;
              if (oldInfo.hasAny && oldInfo.pcts.every(function (p) { return p != null; })) {
                baseline = oldInfo.pcts.slice();
              } else {
                baseline = seedColumnPcts(editor, pos, dragged.mapWidth);
              }

              var corrected = redistribute(baseline, dragged.col, requestedPct);
              applyColumnPcts(fixupTr, pos, node, corrected);
              touchedAnyTable = true;
              return false; // don't descend into this table's own children
            });

            return touchedAnyTable ? fixupTr : null;
          }
        }
      };
    }

    window.installGoogleDocsTableResize = function (editor) {
      if (!editor || editor.__gdocsResizeInstalled) return;
      try {
        var plugin = createGoogleDocsResizePlugin(editor);
        if (!plugin) return;
        if (typeof editor.registerPlugin !== 'function') {
          console.warn('[GDocsResize] editor.registerPlugin is not available on this Tiptap version — cannot install');
          return;
        }
        editor.registerPlugin(plugin);
        editor.__gdocsResizeInstalled = true;
        console.log('[GDocsResize] installed for editor instance', editor.instanceId || editor);
      } catch (err) {
        console.warn('[GDocsResize] install failed for this editor instance', err);
      }
    };
  })();

  // ---------------------------------------------------------------------
  // BUG FIX 1 — Exit list on Backspace
  // ---------------------------------------------------------------------
  // Stock Tiptap normally lets you exit a list by pressing Enter on an
  // empty list item (via ListKeymap). That isn't surfacing reliably in
  // this Bubble-wrapped build. Per product decision, we instead make
  // Backspace on an empty list item explicitly toggle the active list off
  // for that item (lifting it out as a plain paragraph) instead of merging
  // with the previous line.
  //
  // Same registerPlugin() mechanism as the GDocsResize plugin above —
  // EditorState only reads plugin.props off a plugin object (duck-typed,
  // no instanceof check, confirmed in section 12 of the reference .md),
  // so props.handleKeyDown works the same way appendTransaction did there.
  function isCursorAtEmptyListItemStart(editor) {
    var sel = editor.state.selection;
    if (!sel.empty) return false;
    var $from = sel.$from;
    // Cursor must be at the very start of an empty paragraph...
    if ($from.parent.type.name !== 'paragraph' || $from.parent.content.size !== 0) return false;
    if ($from.parentOffset !== 0) return false;
    // ...that paragraph must live inside a listItem somewhere up the tree.
    for (var d = $from.depth; d >= 0; d--) {
      if ($from.node(d).type.name === 'listItem') return true;
    }
    return false;
  }

  function createListExitPlugin(editor) {
    var pluginKey = {};
    return {
      key: pluginKey,
      props: {
        handleKeyDown: function (view, event) {
          if (event.key !== 'Backspace') return false;
          if (!isCursorAtEmptyListItemStart(editor)) return false;

          if (editor.isActive('bulletList')) {
            event.preventDefault();
            editor.chain().focus().toggleBulletList().run();
            return true;
          }
          if (editor.isActive('orderedList')) {
            event.preventDefault();
            editor.chain().focus().toggleOrderedList().run();
            return true;
          }
          return false;
        }
      },
      spec: { key: pluginKey }
    };
  }

  // ---------------------------------------------------------------------
  // BUG FIX 2 — Trailing-paragraph escape route after tables
  // ---------------------------------------------------------------------
  // Confirmed via the extension manifest (reference .md section 2):
  // `gapcursor` is NOT one of the extensions actually loaded in this
  // Tiptap build, regardless of the "Gapcursor: yes" toggle in the Bubble
  // plugin's settings panel. No gapcursor decoration will ever be drawn,
  // so a CSS fix alone cannot help — the only reliable fix is to guarantee
  // a real paragraph node always exists immediately after a top-level
  // table, so there's always an ordinary cursor position to land in.
  //
  // We do this structurally via appendTransaction (same pattern as
  // GDocsResize), which self-heals the invariant for every path a table
  // can end up without a trailing paragraph: insertTable() from either
  // toolbar, paste, undo/redo, or loading previously-saved HTML that
  // predates this fix.
  function findTablesMissingTrailingParagraph(doc) {
    var positions = [];
    doc.forEach(function (node, offset, index) {
      if (node.type.name !== 'table') return;
      var hasNext = index + 1 < doc.childCount;
      var nextIsParagraph = hasNext && doc.child(index + 1).type.name === 'paragraph';
      if (!nextIsParagraph) positions.push(offset + node.nodeSize);
    });
    return positions;
  }

  function createTableEscapeRoutePlugin(editor) {
    var pluginKey = {};
    return {
      key: pluginKey,
      props: {},
      spec: {
        key: pluginKey,
        appendTransaction: function (transactions, oldState, newState) {
          if (!transactions.some(function (t) { return t.docChanged; })) return null;

          var doc = newState.doc;
          var paragraphType = doc.type.schema.nodes.paragraph;
          if (!paragraphType) return null;

          var positions = findTablesMissingTrailingParagraph(doc);
          if (!positions.length) return null;

          var tr = newState.tr;
          // Insert from the end backwards so earlier positions in the
          // list stay valid without needing to map them.
          positions.sort(function (a, b) { return b - a; });
          positions.forEach(function (pos) { tr.insert(pos, paragraphType.create()); });
          return tr;
        }
      }
    };
  }

  // One-time fixup for tables that already exist in content loaded BEFORE
  // this plugin was installed (e.g. previously-saved HTML from before this
  // fix shipped). appendTransaction only runs on transactions dispatched
  // after the plugin is registered, so the initial setContent load needs
  // this separate pass.
  function ensureTrailingParagraphAfterTables(editor) {
    var doc = editor.state.doc;
    var paragraphType = doc.type.schema.nodes.paragraph;
    if (!paragraphType) return;
    var positions = findTablesMissingTrailingParagraph(doc);
    if (!positions.length) return;
    var tr = editor.state.tr;
    positions.sort(function (a, b) { return b - a; });
    positions.forEach(function (pos) { tr.insert(pos, paragraphType.create()); });
    editor.view.dispatch(tr);
  }

  window.installListExitAndTableEscapeRoute = function (editor) {
    if (!editor || editor.__listExitTableEscapeInstalled) return;
    try {
      if (typeof editor.registerPlugin !== 'function') {
        console.warn('[ListExit/TableEscape] editor.registerPlugin is not available on this Tiptap version — cannot install');
        return;
      }
      editor.registerPlugin(createListExitPlugin(editor));
      editor.registerPlugin(createTableEscapeRoutePlugin(editor));
      editor.__listExitTableEscapeInstalled = true;
      ensureTrailingParagraphAfterTables(editor);
      console.log('[ListExit/TableEscape] installed for editor instance', editor.instanceId || editor);
    } catch (err) {
      console.warn('[ListExit/TableEscape] install failed for this editor instance', err);
    }
  };

  // ---------------------------------------------------------------------
  // Defensive gapcursor CSS (belt-and-suspenders only — see note above:
  // this extension isn't actually loaded in the current manifest, so this
  // has no visible effect today. Harmless to keep in case a future plugin
  // update adds it back; the real fix is the appendTransaction plugin.)
  // ---------------------------------------------------------------------
  (function injectGapcursorCSS() {
    if (document.getElementById('huzlly-gapcursor-css')) return;
    var style = document.createElement('style');
    style.id = 'huzlly-gapcursor-css';
    style.textContent =
      '.ProseMirror-gapcursor{display:none;pointer-events:none;position:relative;}' +
      '.ProseMirror-gapcursor:after{content:"";display:block;position:absolute;top:-2px;' +
      'width:20px;border-top:1px solid #333;animation:huzlly-gapcursor-blink 1.1s steps(2,start) infinite;}' +

  function bindEditor(editor) {
    if (!editor || boundEditors.has(editor)) return;
    boundEditors.add(editor);

    // Google-Docs-style fixed-total-width column resizing (see section 12
    // of the reference .md for the full explanation). Must run once per
    // editor instance — safe to call repeatedly, it no-ops after first install.
    installGoogleDocsTableResize(editor);

    // List-exit-on-Backspace + table trailing-paragraph escape route (see
    // the two blocks immediately above). Same idempotent-install pattern.
    installListExitAndTableEscapeRoute(editor);

    var selectionDebounceTimer = null;
    editor.on('selectionUpdate', function () {
      if (selectionDebounceTimer) clearTimeout(selectionDebounceTimer);
      selectionDebounceTimer = setTimeout(function () {
        var sel = editor.state.selection;
        if (sel.empty) {
          scheduleHide(editor);
        } else if (isCellSelection(editor)) {
          // A multi-cell drag-selection. This is a structural table
          // selection, not text — don't show the text-formatting Bubble
          // Menu for it. checkTableContext (below) handles showing the
          // Table Toolbar for this case instead.
          scheduleHide(editor);
        } else if (!isMouseDown) {
          // Only show on selectionUpdate if this selection was NOT made by
          // an active mouse drag (e.g. keyboard Shift+Arrow selection, or
          // a programmatic selection change). While dragging, we wait for
          // 'mouseup' (above) to show the menu, so it appears only once
          // the selection is finalized — not character-by-character mid-drag.
          showMenuFor(editor);
        }
        // If isMouseDown is true here, we deliberately do nothing — the
        // mouseup handler will show the menu once the drag finishes.

        // Table toolbar visibility is independent of text-selection state —
        // it only cares whether the cursor sits inside a table cell, so we
        // check it on every selection update regardless of empty/non-empty.
        checkTableContext(editor);

        // Floating menu: show only when cursor is on an empty paragraph.
        checkFloatingMenuContext(editor);
      }, 20); // tiny debounce: lets transient/stale states during focus
              // transitions settle before we decide to show the menu
    });

    // Floating menu: also check on focus — covers the case where user clicks
    // an empty line that was already the cursor position (selectionUpdate
    // may not fire if the selection didn't actually change).
    editor.on('focus', function () {
      setTimeout(function () { checkFloatingMenuContext(editor); }, 20);
    });

    editor.on('blur', function () {
      // small delay: if the blur happened because the user clicked our
      // menu button, we don't want to hide before the command runs
      scheduleHide(editor);
      scheduleFloatingHide(editor);
      // NOTE: we deliberately do NOT call scheduleTableHide on blur.
      // Blur fires whenever the mouse moves outside the editor without
      // clicking, but the cursor is still inside the table cell — the
      // Table Toolbar should stay visible. It hides only when selectionUpdate
      // confirms the cursor has actually left the table, or the editor is
      // destroyed. Hiding on blur was causing the toolbar to disappear
      // whenever the user moved their mouse away after clicking a cell.
    });

    // RIGHT-CLICK → show bubble menu at cursor position.
    //
    // contextmenu fires on the editor's own DOM node (not document) so we
    // only intercept right-clicks INSIDE this specific editor instance —
    // right-clicks elsewhere on the page are unaffected.
    //
    // Behaviour:
    //   • e.preventDefault() suppresses the browser's native context menu.
    //   • If text is selected (non-empty selection), position the menu at
    //     the right-click point (not the selection midpoint) — the user
    //     may have right-clicked somewhere other than the selected text.
    //   • If no text is selected (collapsed cursor / empty editor), still
    //     show the menu at the click point so the user has access to Insert
    //     Table, Insert Image, HR, headings, etc.
    //   • CellSelection (multi-cell drag) is excluded — the Table Toolbar
    //     already handles that context; showing the Bubble Menu on top
    //     would be confusing.
    editor.view.dom.addEventListener('contextmenu', function (e) {
      // Don't intercept if a modifier key is held (lets OS/browser handle
      // inspect-element or other devtools shortcuts normally).
      if (e.ctrlKey || e.metaKey) return;

      // CellSelection → let the Table Toolbar own this context.
      if (isCellSelection(editor)) return;

      e.preventDefault();

      // Cancel any pending hide that might be in flight (e.g. from a
      // prior blur event that fired just before the right-click).
      if (hideTimer) { clearTimeout(hideTimer); hideTimer = null; }

      // Hide Table Toolbar and Floating Menu — right-click on the editor
      // body means the Bubble Menu should be the only thing showing.
      if (tableHideTimer) { clearTimeout(tableHideTimer); tableHideTimer = null; }
      tableToolbar.style.display = 'none';
      tableActiveEditor = null;
      hideFloatingSystem();

      showMenuForAtCoords(editor, e.clientX, e.clientY);
    });

    // NOTE: we deliberately do NOT show the menu on 'focus'. ProseMirror can
    // briefly report a stale/non-empty selection during the focus
    // transition (e.g. tapping into a different editor without dragging to
    // select text), which caused a momentary menu "flash". The
    // 'selectionUpdate' event below is the reliable signal for deliberate
    // text selection, so menu visibility is driven from there only.

    editor.on('destroy', function () {
      if (activeEditor === editor) {
        menu.style.display = 'none';
        activeEditor = null;
      }
      if (linkPopoverEditor === editor) {
        closeLinkPopover();
      }
      if (imagePopoverEditor === editor) {
        closeImagePopover();
      }
      if (tableActiveEditor === editor) {
        tableToolbar.style.display = 'none';
        tableActiveEditor = null;
      }
      if (floatingActiveEditor === editor) {
        hideFloatingSystem();
      }
    });
  }

  function scanForEditors() {
    var nodes = document.querySelectorAll('.ProseMirror');
    nodes.forEach(function (node) {
      var editor = node.editor;
      if (editor) {
        bindEditor(editor);
      }
    });
  }

  // is inside a table cell. Independent of the text-selection Bubble Menu
  // above (different trigger condition: cursor position, not selection).
  // ---------------------------------------------------------------------
  var tableToolbar = document.createElement('div');
  tableToolbar.id = 'huzlly-table-toolbar';
  tableToolbar.style.cssText = [
    'position:fixed',
    'top:0',
    'left:0',
    'z-index:9999',
    'display:none',
    'background:#1f1f1f',
    'border-radius:8px',
    'box-shadow:0 4px 14px rgba(0,0,0,0.25)',
    'padding:4px',
    'gap:2px',
    'flex-direction:row',
    'align-items:center',
    'font-family:DM Sans, Helvetica, Arial, sans-serif'
  ].join(';');

  var tableActiveEditor = null;
  var tableHideTimer = null;
  var activeDropdown = null; // which dropdown panel is currently open

  // STYLES — injected once into <head>

    // Default grid baseline. NOTE: width:100% + table-layout:fixed here is
    // NOT itself the fix for the resize-overflow bug — it's just the
    // initial layout before any column has an explicit width. The actual
    // fixed-total-width guarantee (now in PERCENT, not pixels — see the
    // big comment above the GOOGLE-DOCS-STYLE COLUMN RESIZING plugin)
    // comes from installGoogleDocsTableResize, which keeps every cell's
    // own style="width:%" summing to exactly 100. table-layout:fixed is
    // required for those percentages to apply per-column instead of
    // shrinking/growing to content. min-width below is just a readability
    // floor (px, absolute on purpose — it's a UI safety net, not part of

    '.ProseMirror table { border-collapse: collapse; width: 100%; table-layout: fixed; }' +
    '.ProseMirror table td, .ProseMirror table th { border: 1px solid #ced4da !important; min-width: 40px; word-break: break-word; }' +
    // Wrap table in a scrollable container so drag-resize beyond editor width
    // shows a scrollbar INSIDE the editor block, not on the page/Bubble wrapper.
    // overflow-x:auto on .ProseMirror itself handles horizontal overflow cleanly.
    // overflow-y:visible keeps vertical content (dropdowns etc.) from clipping.
    '.ProseMirror { overflow-x: auto; overflow-y: visible; }' +
    // The column-resize handle is position:absolute — it must not trigger a
    // horizontal scrollbar on its own. Negative left offset of the handle
    // (it straddles the cell border) was causing the left-side scrollbar flash.
    '.ProseMirror .column-resize-handle { position: absolute; right: -2px; top: 0; bottom: 0; width: 4px; background: #7F77DD; pointer-events: none; z-index: 20; }' +

    '.ProseMirror { position: relative; }' +
    // CellSelection highlight overlay
    '.ProseMirror table td, .ProseMirror table th { position: relative; }' +
    '.ProseMirror .selectedCell:after { content: ""; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(127, 119, 221, 0.3); pointer-events: none; }' +

    '  background:#1f1f1f; border-radius:8px; box-shadow:0 6px 20px rgba(0,0,0,0.35);' +
    '  padding:4px; display:none; flex-direction:column; gap:2px; min-width:180px; z-index:10000; }' +
    '.huzlly-dropdown.open { display:flex; }' +
    // Flip upward when toolbar is near top of viewport (class toggled in JS)
    '.huzlly-dropdown.flip { top:auto; bottom:calc(100% + 6px); }' +
    '.huzlly-dropdown-item { display:flex; align-items:center; gap:8px; padding:6px 10px;' +
    '  border:none; background:transparent; color:#fff; border-radius:6px; cursor:pointer;' +
    '  font-family:DM Sans,Helvetica,Arial,sans-serif; font-size:13px; white-space:nowrap; width:100%; text-align:left; }' +
    '.huzlly-dropdown-item:hover { background:#534AB7; }' +
    '.huzlly-dropdown-item.active { background:#7F77DD; }' +
    '.huzlly-dropdown-separator { height:1px; background:#333; margin:3px 6px; }' +
    // Group trigger button styles (shared with bubble menu makeButton style)
    '.huzlly-group-btn { border:none; background:transparent; color:#fff; height:30px;' +
    '  border-radius:6px; cursor:pointer; display:flex; align-items:center; gap:5px;' +
    '  padding:0 8px; font-family:DM Sans,Helvetica,Arial,sans-serif; font-size:12px;' +
    '  font-weight:500; white-space:nowrap; position:relative; }' +
    '.huzlly-group-btn:hover, .huzlly-group-btn.open { background:#534AB7; }' +
